<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>โหวตคะแนน</title>
  <link rel="stylesheet" href="/style.css?v=17" />
</head>
<body>
  <div class="container">
    <a href="" id="backLink" class="hint" style="text-decoration:none;">← กลับหน้าห้องเรียน</a>
    <h1 style="margin-top:6px;">หน้าให้คะแนนเพื่อนในกลุ่ม</h1>
    <div id="userInfo" class="user-info">กำลังโหลด...</div>
    <div id="content"></div>
    <div id="message"></div>
    <div style="margin-top: 24px; text-align: center;">
      <button class="secondary" id="logoutBtn">ออกจากระบบ</button>
    </div>
  </div>

  <script>
    const cid = window.location.pathname.split('/')[2];
    const userKey = `pr_user_${cid}`;
    const user = JSON.parse(localStorage.getItem(userKey) || 'null');
    if (!user) window.location.href = `/c/${cid}`;

    document.getElementById('backLink').href = `/c/${cid}/feed`;

    const userIdent = encodeURIComponent(user.phone || user.studentId);

    const userInfoEl = document.getElementById('userInfo');
    const contentEl = document.getElementById('content');
    const msgEl = document.getElementById('message');

    function escapeHtml(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }
    function fullName() {
      return `${user.firstName || ''} ${user.lastName || ''}`.trim() || user.name || user.studentId;
    }

    document.getElementById('logoutBtn').onclick = () => {
      localStorage.removeItem(userKey);
      window.location.href = `/c/${cid}`;
    };

    userInfoEl.innerHTML = `
      <b>${escapeHtml(fullName())}</b>
      ${user.nickname ? `(${escapeHtml(user.nickname)})` : ''}
      &nbsp;|&nbsp; <b>รหัส:</b> ${escapeHtml(user.studentId)}
      ${user.group ? ` &nbsp;|&nbsp; <b>กลุ่ม:</b> ${escapeHtml(user.group)}` : ''}
    `;

    let scores = {};
    let peers = [];
    let myState = null;
    let pollTimer = null;

    async function loadMe() {
      try {
        const res = await fetch(`/api/c/${cid}/me/${userIdent}`);
        if (res.status === 404) {
          localStorage.removeItem(userKey);
          window.location.href = `/c/${cid}`;
          return false;
        }
        if (!res.ok) return false;
        myState = await res.json();
        return true;
      } catch (e) { return false; }
    }

    async function init() {
      await loadMe();
      render();
    }

    async function refreshState() {
      const ok = await loadMe();
      if (ok) render();
    }

    function render() {
      if (!myState) {
        contentEl.innerHTML = `<div class="message error">เชื่อมต่อเซิร์ฟเวอร์ไม่ได้</div>`;
        return;
      }
      // Update local user with fresh state (group might have been set by admin)
      if (myState.user && myState.user.group) {
        user.group = myState.user.group;
        localStorage.setItem(userKey, JSON.stringify(user));
      }
      if (myState.hasVoted) {
        if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
        renderDone();
      } else if (myState.votingOpen) {
        if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
        if (!myState.user.group) {
          contentEl.innerHTML = `
            <div class="card" style="text-align: center; padding: 30px;">
              <h2 style="border:none;">รอผู้สอนกำหนดกลุ่ม</h2>
              <p style="color: #777; margin-top: 8px;">คุณยังไม่ได้รับการกำหนดกลุ่ม รอผู้สอนจัดให้ก่อน</p>
              <div style="margin-top: 18px; font-size: 28px;">📌</div>
            </div>
          `;
          if (!pollTimer) pollTimer = setInterval(refreshState, 3000);
          return;
        }
        loadPeers();
      } else {
        renderWaiting();
        if (!pollTimer) pollTimer = setInterval(refreshState, 3000);
      }
    }

    function renderWaiting() {
      contentEl.innerHTML = `
        <div class="card" style="text-align: center; padding: 30px;">
          <h2 style="border:none;">รอระบบเปิดให้โหวต</h2>
          <p style="color: #777; margin-top: 8px;">หน้าจอจะอัปเดตอัตโนมัติเมื่อระบบเปิดให้โหวต</p>
          <div style="margin-top: 18px; font-size: 28px;">⏳</div>
        </div>
      `;
    }

    async function loadPeers() {
      try {
        const res = await fetch(`/api/c/${cid}/peers/${userIdent}`);
        const data = await res.json();
        if (!res.ok) {
          contentEl.innerHTML = `<div class="message error">${escapeHtml(data.error)}</div>`;
          return;
        }
        peers = data.peers;
        if (peers.length === 0) {
          contentEl.innerHTML = `
            <div class="empty-state">
              ยังไม่มีเพื่อนในกลุ่ม "${escapeHtml(user.group)}" คนอื่นลงทะเบียน
            </div>
          `;
          return;
        }
        renderPeers();
      } catch (e) {
        contentEl.innerHTML = `<div class="message error">${escapeHtml(e.message)}</div>`;
      }
    }

    function renderPeers() {
      const peersHtml = peers.map(p => {
        const key = p.phone || p.studentId;
        const idLabel = p.studentId || p.phone;
        const photo = p.selfie
          ? `<img src="${escapeHtml(p.selfie)}" alt="${escapeHtml(p.name)}" />`
          : `<div class="no-photo">?</div>`;
        return `
          <div class="card">
            <div class="peer-row">
              <div class="peer-photo${p.selfie ? ' clickable' : ''}"
                   ${p.selfie ? `data-photo="${escapeHtml(p.selfie)}" data-name="${escapeHtml(p.fullName || p.name)} (${escapeHtml(idLabel)})"` : ''}>
                ${photo}
              </div>
              <div class="peer-info">
                <div class="pname">${escapeHtml(p.name)}</div>
                <div class="pid">${escapeHtml(idLabel)}</div>
              </div>
              <div class="score-buttons" data-target="${escapeHtml(key)}">
                ${[1,2,3,4,5].map(n => `<button type="button" class="score-btn" data-score="${n}">${n}</button>`).join('')}
              </div>
            </div>
          </div>
        `;
      }).join('');

      contentEl.innerHTML = `
        <h2>ให้คะแนนเพื่อนในกลุ่ม (1 = น้อยสุด, 5 = มากสุด)</h2>
        ${peersHtml}
        <button class="primary" id="submitBtn" disabled>ยืนยันคะแนน</button>
        <p class="hint" id="progressHint">เลือกคะแนนให้ครบทุกคน (0/${peers.length})</p>
      `;

      contentEl.querySelectorAll('.score-buttons').forEach(group => {
        const target = group.dataset.target;
        group.querySelectorAll('.score-btn').forEach(btn => {
          btn.onclick = () => {
            scores[target] = parseInt(btn.dataset.score);
            group.querySelectorAll('.score-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            updateProgress();
          };
        });
      });

      contentEl.querySelectorAll('.peer-photo.clickable').forEach(el => {
        el.onclick = () => openPhotoModal(el.dataset.photo, el.dataset.name);
      });

      document.getElementById('submitBtn').onclick = submitVote;
    }

    function openPhotoModal(url, name) {
      const overlay = document.createElement('div');
      overlay.className = 'photo-modal';
      overlay.innerHTML = `
        <div class="photo-modal-inner">
          <img src="${url}" alt="" />
          <div class="photo-modal-name">${name}</div>
          <button class="photo-modal-close" type="button">ปิด</button>
        </div>
      `;
      const close = () => overlay.remove();
      overlay.onclick = (e) => { if (e.target === overlay) close(); };
      overlay.querySelector('.photo-modal-close').onclick = close;
      document.addEventListener('keydown', function esc(e) {
        if (e.key === 'Escape') { close(); document.removeEventListener('keydown', esc); }
      });
      document.body.appendChild(overlay);
    }

    function updateProgress() {
      const done = Object.keys(scores).length;
      document.getElementById('progressHint').textContent = `เลือกคะแนนให้ครบทุกคน (${done}/${peers.length})`;
      document.getElementById('submitBtn').disabled = done !== peers.length;
    }

    async function submitVote() {
      if (!confirm('ยืนยันการให้คะแนน?\n\nเมื่อยืนยันแล้วไม่สามารถแก้ไข')) return;
      const payload = {
        voterId: user.phone || user.studentId,
        scores: peers.map(p => { const k = p.phone || p.studentId; return { targetId: k, score: scores[k] }; })
      };
      try {
        const res = await fetch(`/api/c/${cid}/vote`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (!res.ok) { msgEl.innerHTML = `<div class="message error">${escapeHtml(data.error)}</div>`; return; }
        msgEl.innerHTML = '';
        await refreshState();
      } catch (e) {
        msgEl.innerHTML = `<div class="message error">${escapeHtml(e.message)}</div>`;
      }
    }

    function renderDone() {
      contentEl.innerHTML = `
        <div class="card" style="text-align: center; padding: 40px;">
          <h2 style="border:none; color:#27ae60;">ขอบคุณสำหรับการให้คะแนน</h2>
          <p style="color: #777; margin-top: 8px;">คุณได้ยืนยันคะแนนเรียบร้อยแล้ว</p>
          <div style="margin-top: 18px; font-size: 36px;">✓</div>
        </div>
      `;
    }

    init();
  </script>
</body>
</html>
