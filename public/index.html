<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ห้องเรียนทั้งหมด</title>
  <link rel="stylesheet" href="/style.css?v=9" />
</head>
<body class="home-body">
  <div class="top-nav">
    <a href="/admin" class="login-btn">🔐 Login (Admin / อาจารย์)</a>
  </div>

  <div class="container wide">
    <h1>📚 ห้องเรียนทั้งหมด</h1>
    <p class="subtitle">เลือกห้องเรียนที่ต้องการเข้า</p>

    <div class="theme-picker">
      <span class="theme-picker-label">🎨 ธีมสี:</span>
      <button class="theme-dot theme-warm" data-theme="warm" data-emoji="☕" title="อบอุ่น (Warm)"></button>
      <button class="theme-dot theme-sunny" data-theme="sunny" data-emoji="☀️" title="สดใส (Sunny)"></button>
      <button class="theme-dot theme-calm" data-theme="calm" data-emoji="🌊" title="สบาย (Calm)"></button>
      <button class="theme-dot theme-fresh" data-theme="fresh" data-emoji="🌿" title="สดชื่น (Fresh)"></button>
      <button class="theme-dot theme-cute" data-theme="cute" data-emoji="🌸" title="น่ารัก (Cute)"></button>
      <button class="theme-dot theme-creative" data-theme="creative" data-emoji="🎨" title="สร้างสรรค์ (Creative)"></button>
      <button class="theme-dot theme-minimal" data-theme="minimal" data-emoji="🌙" title="มินิมอล (Minimal)"></button>
    </div>

    <div id="list" class="classroom-list">
      <p class="hint">กำลังโหลด...</p>
    </div>
  </div>

  <script>
    function escapeHtml(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }

    // Theme picker
    const VALID_THEMES = ['warm', 'sunny', 'calm', 'fresh', 'cute', 'creative', 'minimal'];
    function applyTheme(name) {
      if (!VALID_THEMES.includes(name)) name = 'warm';
      document.body.className = 'home-body theme-' + name;
      localStorage.setItem('pr_theme', name);
      document.querySelectorAll('.theme-dot').forEach(d =>
        d.classList.toggle('active', d.dataset.theme === name));
    }
    applyTheme(localStorage.getItem('pr_theme') || 'warm');
    document.querySelectorAll('.theme-dot').forEach(d => {
      d.onclick = () => applyTheme(d.dataset.theme);
    });

    async function load() {
      try {
        const res = await fetch('/api/classrooms');
        const data = await res.json();
        const el = document.getElementById('list');
        if (!data.classrooms || data.classrooms.length === 0) {
          el.innerHTML = `<div class="empty-state">ยังไม่มีห้องเรียน — รอผู้ดูแลสร้างห้องเรียนก่อน</div>`;
          return;
        }
        el.innerHTML = data.classrooms.map(c => `
          <a class="classroom-card" href="/c/${escapeHtml(c.id)}">
            <div class="cc-code">${escapeHtml(c.code)}</div>
            <div class="cc-name">${escapeHtml(c.name)}</div>
            <div class="cc-uni">${escapeHtml(c.university || '')}</div>
            ${c.description ? `<div class="cc-desc">${escapeHtml(c.description)}</div>` : ''}
            <div class="cc-meta">
              <span>นักศึกษา ${c.studentCount} คน</span>
              <span class="${c.registrationOpen ? 'open' : 'closed'}">
                ${c.registrationOpen ? '● เปิดลงทะเบียน' : '○ ปิดลงทะเบียน'}
              </span>
            </div>
          </a>
        `).join('');
      } catch (e) {
        document.getElementById('list').innerHTML = `<div class="message error">โหลดข้อมูลไม่ได้</div>`;
      }
    }

    load();
  </script>
</body>
</html>
