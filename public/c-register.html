<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ลงทะเบียนเข้าห้องเรียน</title>
  <link rel="stylesheet" href="/style.css?v=16" />
</head>
<body>
  <div class="container">
    <div id="cInfo" class="user-info" style="margin-bottom: 18px;">กำลังโหลด...</div>

    <h1>ลงทะเบียน / เข้าสู่ระบบ</h1>
    <p class="subtitle" id="stepLabel">ขั้นที่ 1: กรอกเบอร์มือถือ</p>

    <!-- Step 1: Phone -->
    <form id="phoneForm">
      <label for="phone">เบอร์มือถือ *</label>
      <input type="tel" id="phone" inputmode="tel" placeholder="0812345678" required autocomplete="tel" />
      <button type="submit" class="primary">ถัดไป</button>
    </form>

    <!-- Step 2: Enroll code -->
    <form id="codeForm" style="display:none;">
      <p class="hint" style="margin-top:8px;">🔑 กรุณากรอกรหัสคลาส 4 หลัก ที่อาจารย์แจ้ง</p>
      <label for="enrollCode">รหัสคลาส 4 หลัก *</label>
      <input type="text" id="enrollCode" inputmode="numeric" pattern="[0-9]{4}" maxlength="4" placeholder="0000" required style="font-size: 22px; letter-spacing: 8px; text-align: center;" />
      <button type="submit" class="primary" id="codeSubmitBtn">ถัดไป</button>
    </form>

    <!-- Step 3: Profile fields (only for new users) -->
    <form id="profileForm" style="display:none;">
      <p class="hint" id="profileHint" style="margin-top:8px;">📝 กรอกข้อมูลโปรไฟล์</p>
      <div id="profileFieldsContainer"></div>

      <div id="groupSection" style="display:none;">
        <label>เลือกกลุ่ม *</label>
        <div class="group-buttons" id="groupButtons"></div>
        <input type="hidden" id="group" />
      </div>
      <div id="groupNote" class="hint" style="display:none; margin-top: 6px;"></div>

      <button type="submit" class="primary" style="margin-top: 14px;">เข้าสู่คลาส</button>
    </form>

    <div id="message"></div>

    <p class="hint" style="margin-top: 24px; text-align: center;">
      <a href="/" style="color: #888;">← กลับไปเลือกห้องเรียน</a>
    </p>
  </div>

  <script>
    const cid = window.location.pathname.split('/')[2];
    const cInfo = document.getElementById('cInfo');
    const phoneForm = document.getElementById('phoneForm');
    const codeForm = document.getElementById('codeForm');
    const profileForm = document.getElementById('profileForm');
    const stepLabel = document.getElementById('stepLabel');
    const msg = document.getElementById('message');
    const groupSection = document.getElementById('groupSection');
    const groupButtons = document.getElementById('groupButtons');
    const groupInput = document.getElementById('group');
    let classroom = null;
    let isReturning = false;

    function escapeHtml(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }

    const userKey = `pr_user_${cid}`;
    const saved = localStorage.getItem(userKey);
    if (saved) {
      const u = JSON.parse(saved);
      window.location.href = u.selfie ? `/c/${cid}/feed` : `/c/${cid}/selfie`;
    }

    async function loadClassroom() {
      try {
        const res = await fetch(`/api/c/${cid}`);
        if (!res.ok) {
          cInfo.innerHTML = `<span style="color:#c33;">ไม่พบห้องเรียน "${escapeHtml(cid)}"</span>`;
          phoneForm.style.display = 'none';
          return;
        }
        const data = await res.json();
        classroom = data.classroom;
        cInfo.innerHTML = `
          <b>${escapeHtml(classroom.code)}</b> — ${escapeHtml(classroom.name)}<br>
          <span style="color:#888; font-size:13px;">${escapeHtml(classroom.university)}</span>
          ${classroom.description ? `<div style="margin-top:6px; color:#666; font-size:13px;">${escapeHtml(classroom.description)}</div>` : ''}
        `;
        if (!classroom.registrationOpen) {
          phoneForm.style.display = 'none';
          msg.innerHTML = `<div class="message info">ห้องเรียนนี้ปิดรับลงทะเบียนแล้ว — เฉพาะคนที่ลงทะเบียนไว้แล้วเท่านั้นที่เข้าได้</div>`;
        }
      } catch (e) {
        cInfo.innerHTML = `<span style="color:#c33;">โหลดข้อมูลไม่ได้</span>`;
      }
    }

    function buildProfileForm() {
      const container = document.getElementById('profileFieldsContainer');
      const fields = (classroom.profileFields || []).filter(f => f.enabled);
      container.innerHTML = fields.map(f => {
        const star = f.required ? ' <span style="color:#c33;">*</span>' : ' <span class="opt">(ไม่บังคับ)</span>';
        const req = f.required ? 'required' : '';
        if (f.key === 'name') {
          return `
            <label>${escapeHtml(f.label)}${star}</label>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
              <input type="text" name="firstName" placeholder="ชื่อ" ${req} />
              <input type="text" name="lastName" placeholder="นามสกุล" ${req} />
            </div>
          `;
        }
        if (f.key === 'university') {
          return `
            <label>${escapeHtml(f.label)}${star}</label>
            <input type="text" name="university" value="${escapeHtml(classroom.university || '')}" ${req} />
          `;
        }
        const placeholder = ({
          studentId: 'เช่น 65010001',
          nickname: 'ชื่อเล่น',
          faculty: 'เช่น คณะวิศวกรรมศาสตร์',
          department: 'เช่น สาขาวิทยาการคอมพิวเตอร์',
          company: 'ชื่อบริษัท',
          position: 'ตำแหน่ง'
        })[f.key] || '';
        return `
          <label>${escapeHtml(f.label)}${star}</label>
          <input type="text" name="${escapeHtml(f.key)}" placeholder="${escapeHtml(placeholder)}" ${req} />
        `;
      }).join('');

      // Group section
      if (!classroom.peerReviewEnabled) return;
      const mode = classroom.groupAssignmentMode || 'self';
      const note = document.getElementById('groupNote');
      if (mode === 'self') {
        groupSection.style.display = '';
        groupButtons.innerHTML = classroom.validGroups.map(g =>
          `<button type="button" class="group-btn" data-group="${escapeHtml(g)}">กลุ่ม ${escapeHtml(g)}</button>`
        ).join('');
        groupButtons.querySelectorAll('.group-btn').forEach(btn => {
          btn.onclick = () => {
            groupButtons.querySelectorAll('.group-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            groupInput.value = btn.dataset.group;
          };
        });
      } else if (mode === 'random') {
        note.style.display = '';
        note.innerHTML = `🎲 <b>ระบบจะสุ่มกลุ่มให้อัตโนมัติ</b> (มี ${classroom.validGroups.length} กลุ่ม)`;
      } else if (mode === 'admin') {
        note.style.display = '';
        note.innerHTML = `📌 <b>ผู้สอนจะกำหนดกลุ่มให้ภายหลัง</b>`;
      }
    }

    // Step 1: Phone
    phoneForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      msg.innerHTML = '';
      const phone = document.getElementById('phone').value.replace(/[^\d+]/g, '').trim();
      if (!phone) {
        msg.innerHTML = `<div class="message error">กรุณากรอกเบอร์มือถือ</div>`;
        return;
      }
      try {
        const res = await fetch(`/api/c/${cid}/check-phone`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone })
        });
        const data = await res.json();
        phoneForm.style.display = 'none';
        isReturning = !!data.exists;
        codeForm.style.display = '';
        stepLabel.textContent = 'ขั้นที่ 2: กรอกรหัสคลาส 4 หลัก';
        msg.innerHTML = isReturning
          ? `<div class="message info">เคยลงทะเบียนแล้ว — กรอกรหัสคลาสเพื่อเข้าระบบ</div>`
          : '';
        document.getElementById('codeSubmitBtn').textContent = isReturning ? 'เข้าสู่คลาส' : 'ถัดไป';
        document.getElementById('enrollCode').focus();
      } catch (err) {
        msg.innerHTML = `<div class="message error">${escapeHtml(err.message)}</div>`;
      }
    });

    // Step 2: Enroll code
    codeForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      msg.innerHTML = '';
      const code = document.getElementById('enrollCode').value.trim();
      if (!/^\d{4}$/.test(code)) {
        msg.innerHTML = `<div class="message error">รหัสต้องเป็นตัวเลข 4 หลัก</div>`;
        return;
      }
      // Validate code first
      try {
        const r = await fetch(`/api/c/${cid}/validate-enroll-code`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ enrollCode: code })
        });
        const d = await r.json();
        if (!r.ok) {
          msg.innerHTML = `<div class="message error">${escapeHtml(d.error)}</div>`;
          return;
        }
      } catch (err) {
        msg.innerHTML = `<div class="message error">${escapeHtml(err.message)}</div>`;
        return;
      }

      // If returning user, register directly (login)
      if (isReturning) {
        await doRegister({});
        return;
      }
      // New user: show profile form
      codeForm.style.display = 'none';
      buildProfileForm();
      profileForm.style.display = '';
      stepLabel.textContent = 'ขั้นที่ 3: กรอกข้อมูลโปรไฟล์';
    });

    // Step 3: Profile (new users)
    profileForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      msg.innerHTML = '';
      const fd = new FormData(profileForm);
      const profileData = {};
      ['firstName', 'lastName', 'studentId', 'nickname', 'faculty', 'department', 'university', 'company', 'position'].forEach(k => {
        const v = fd.get(k);
        if (v != null) profileData[k] = String(v).trim();
      });
      const mode = classroom && classroom.groupAssignmentMode || 'self';
      if (classroom && classroom.peerReviewEnabled && mode === 'self' && !groupInput.value) {
        msg.innerHTML = `<div class="message error">กรุณาเลือกกลุ่ม</div>`;
        return;
      }
      profileData.group = groupInput.value || '';
      await doRegister(profileData);
    });

    async function doRegister(extra) {
      const payload = {
        phone: document.getElementById('phone').value.replace(/[^\d+]/g, '').trim(),
        enrollCode: document.getElementById('enrollCode').value.trim(),
        ...extra
      };
      try {
        const res = await fetch(`/api/c/${cid}/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (!res.ok) {
          msg.innerHTML = `<div class="message error">${escapeHtml(data.error)}</div>`;
          return;
        }
        localStorage.setItem(userKey, JSON.stringify(data.user));
        msg.innerHTML = `<div class="message success">${escapeHtml(data.message)}</div>`;
        const next = data.user.selfie ? `/c/${cid}/feed` : `/c/${cid}/selfie`;
        setTimeout(() => { window.location.href = next; }, 800);
      } catch (err) {
        msg.innerHTML = `<div class="message error">${escapeHtml(err.message)}</div>`;
      }
    }

    loadClassroom();
  </script>
</body>
</html>
