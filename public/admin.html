<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ระบบหลังบ้าน</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div id="loginView" class="container">
    <h1>เข้าสู่ระบบสำหรับผู้ดูแล</h1>
    <p class="subtitle">กรุณาใส่ข้อมูลผู้ดูแลระบบ</p>
    <form id="loginForm">
      <label>ชื่อผู้ใช้</label>
      <input type="text" id="username" required />
      <label>รหัสผ่าน</label>
      <input type="password" id="password" required />
      <button type="submit" class="primary">เข้าสู่ระบบ</button>
    </form>
    <div id="loginMsg"></div>
    <p class="hint" style="margin-top: 24px; text-align: center;">
      <a href="/" style="color: #888;">← กลับหน้าหลัก</a>
    </p>
  </div>

  <!-- Super-admin view: list classrooms -->
  <div id="superView" class="container wide" style="display: none;">
    <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px;">
      <div>
        <h1>จัดการห้องเรียน</h1>
        <p class="subtitle" style="margin: 0;">สร้าง / แก้ไข / ลบห้องเรียน</p>
      </div>
      <div style="display:flex; gap:8px; flex-wrap: wrap;">
        <button id="newClassBtn" class="primary" style="margin:0;">+ สร้างห้องเรียนใหม่</button>
        <button class="secondary" id="logoutBtn1">ออกจากระบบ</button>
      </div>
    </div>

    <div id="classroomsList" style="margin-top: 24px;">
      <p class="hint">กำลังโหลด...</p>
    </div>
  </div>

  <!-- Classroom admin view -->
  <div id="classView" class="container wide" style="display: none;">
    <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px;">
      <div>
        <a href="/admin" style="color:#888; font-size:13px; text-decoration:none;">← จัดการห้องเรียน</a>
        <h1 id="cTitle" style="margin-top: 4px;">-</h1>
        <p class="subtitle" id="cSubtitle" style="margin: 0;">-</p>
      </div>
      <button class="secondary" id="logoutBtn2">ออกจากระบบ</button>
    </div>

    <div class="status-bar">
      <div class="status-grp">
        <span>การลงทะเบียน:
          <span id="regState" class="vote-state closed">-</span>
        </span>
        <span>การโหวต:
          <span id="voteState" class="vote-state closed">-</span>
        </span>
      </div>
      <div class="actions">
        <button id="toggleReg" class="secondary">เปิด/ปิด ลงทะเบียน</button>
        <button id="toggleVote" class="success">เปิดให้โหวต</button>
        <button id="randomizeBtn" class="secondary">สุ่มกลุ่มใหม่ทั้งหมด</button>
        <a id="dashLink" target="_blank" class="secondary" style="text-decoration:none;display:inline-block;padding:12px 24px;border-radius:8px;background:#f0f2f8;color:#444;font-size:15px;font-weight:500;">เปิด Dashboard</a>
        <a id="regLink" target="_blank" class="secondary" style="text-decoration:none;display:inline-block;padding:12px 24px;border-radius:8px;background:#f0f2f8;color:#444;font-size:15px;font-weight:500;">หน้าลงทะเบียน</a>
        <button id="exportBtn" class="secondary">Export CSV</button>
        <button id="exportJsonBtn" class="secondary">Export JSON</button>
        <button id="resetVotesBtn" class="danger">ล้างคะแนนโหวต</button>
        <button id="resetAllBtn" class="danger">ล้างข้อมูลทั้งหมด</button>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="users">รายชื่อผู้ลงทะเบียน</button>
      <button class="tab" data-tab="scores">คะแนนรวม (Mode)</button>
      <button class="tab" data-tab="assignments">งานที่มอบหมาย</button>
    </div>

    <div id="usersTab" class="tab-content"></div>
    <div id="scoresTab" class="tab-content" style="display: none;"></div>
    <div id="assignmentsTab" class="tab-content" style="display: none;"></div>
  </div>

  <div id="modalRoot"></div>

  <script>
    const pathParts = window.location.pathname.split('/');
    // /admin → super; /c/:cid/admin → classroom view
    const cid = (pathParts[1] === 'c' && pathParts[3] === 'admin') ? pathParts[2] : null;

    let token = localStorage.getItem('pr_admin_token') || null;

    const loginView = document.getElementById('loginView');
    const superView = document.getElementById('superView');
    const classView = document.getElementById('classView');

    function escapeHtml(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }
    function modeLabel(m) {
      return ({ self: 'เลือกเอง', random: 'สุ่ม', admin: 'ผู้สอนกำหนด' })[m || 'self'] || m;
    }
    function formatDate(iso) {
      if (!iso) return '-';
      return new Date(iso).toLocaleString('th-TH', { year: '2-digit', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
    }

    if (token) showAuthed();

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const msg = document.getElementById('loginMsg');
      msg.innerHTML = '';
      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (!res.ok) { msg.innerHTML = `<div class="message error">${escapeHtml(data.error)}</div>`; return; }
        token = data.token;
        localStorage.setItem('pr_admin_token', token);
        showAuthed();
      } catch (err) {
        msg.innerHTML = `<div class="message error">${escapeHtml(err.message)}</div>`;
      }
    });

    function logout() {
      localStorage.removeItem('pr_admin_token');
      token = null;
      superView.style.display = 'none';
      classView.style.display = 'none';
      loginView.style.display = '';
    }
    document.getElementById('logoutBtn1').onclick = logout;
    document.getElementById('logoutBtn2').onclick = logout;

    function authFetch(url, opts = {}) {
      return fetch(url, {
        ...opts,
        headers: {
          ...(opts.headers || {}),
          'X-Admin-Auth': token,
          ...(opts.body ? { 'Content-Type': 'application/json' } : {})
        }
      });
    }

    function showAuthed() {
      loginView.style.display = 'none';
      if (cid) {
        classView.style.display = '';
        initClassView();
      } else {
        superView.style.display = '';
        initSuperView();
      }
    }

    // ==================== Super-admin: classroom management ====================

    async function initSuperView() {
      await loadClassrooms();
    }

    async function loadClassrooms() {
      const res = await authFetch('/api/admin/classrooms');
      if (res.status === 401) { logout(); return; }
      const { classrooms } = await res.json();
      const el = document.getElementById('classroomsList');
      if (!classrooms.length) {
        el.innerHTML = `<div class="empty-state">ยังไม่มีห้องเรียน — กดปุ่ม "สร้างห้องเรียนใหม่" ด้านบน</div>`;
        return;
      }
      el.innerHTML = classrooms.map(c => `
        <div class="classroom-row card">
          <div class="cr-main">
            <div class="cr-code">${escapeHtml(c.code)}</div>
            <div class="cr-name">${escapeHtml(c.name)}</div>
            <div class="cr-uni">${escapeHtml(c.university || '')}</div>
            ${c.description ? `<div class="cr-desc">${escapeHtml(c.description)}</div>` : ''}
            <div class="cr-meta">
              <span>นักศึกษา <b>${c.studentCount}</b> คน</span>
              <span>โหวต <b>${c.voteCount}</b> รายการ</span>
              <span class="${c.registrationOpen ? 'open' : 'closed'}">${c.registrationOpen ? '● ลงทะเบียน เปิด' : '○ ลงทะเบียน ปิด'}</span>
              <span class="${c.votingOpen ? 'open' : 'closed'}">${c.votingOpen ? '● โหวต เปิด' : '○ โหวต ปิด'}</span>
              ${c.peerReviewEnabled ? `<span class="tag-pr">Peer Review · ${c.validGroups.length} กลุ่ม · ${modeLabel(c.groupAssignmentMode)}</span>` : ''}
            </div>
          </div>
          <div class="cr-actions">
            <a href="/c/${escapeHtml(c.id)}/admin" class="primary" style="text-decoration:none;display:inline-block;padding:10px 18px;border-radius:8px;background:#667eea;color:#fff;font-size:14px;font-weight:500;">จัดการ</a>
            <a href="/c/${escapeHtml(c.id)}" target="_blank" class="secondary" style="text-decoration:none;display:inline-block;padding:10px 18px;border-radius:8px;background:#f0f2f8;color:#444;font-size:14px;">หน้าลงทะเบียน</a>
            <a href="/c/${escapeHtml(c.id)}/dashboard" target="_blank" class="secondary" style="text-decoration:none;display:inline-block;padding:10px 18px;border-radius:8px;background:#f0f2f8;color:#444;font-size:14px;">Dashboard</a>
            <button class="danger" data-del="${escapeHtml(c.id)}">ลบ</button>
          </div>
        </div>
      `).join('');
      el.querySelectorAll('button[data-del]').forEach(b => {
        b.onclick = async () => {
          const id = b.dataset.del;
          if (!confirm(`ลบห้องเรียน "${id}" และข้อมูลทั้งหมด? การกระทำนี้ย้อนกลับไม่ได้`)) return;
          await authFetch(`/api/admin/classrooms/${id}`, { method: 'DELETE' });
          await loadClassrooms();
        };
      });
    }

    document.getElementById('newClassBtn').onclick = () => {
      const root = document.getElementById('modalRoot');
      root.innerHTML = `
        <div class="modal-backdrop" id="modalBg">
          <div class="modal" onclick="event.stopPropagation()">
            <button class="secondary modal-close" id="closeModal">ปิด</button>
            <h3>สร้างห้องเรียนใหม่</h3>
            <form id="newForm">
              <label>รหัสวิชา (เช่น GE 207)</label>
              <input type="text" id="nfCode" required />
              <label>ชื่อวิชา</label>
              <input type="text" id="nfName" required />
              <label>คำอธิบายรายวิชา</label>
              <input type="text" id="nfDesc" placeholder="ไม่บังคับ" />
              <label>มหาวิทยาลัย</label>
              <input type="text" id="nfUni" value="มหาวิทยาลัยกรุงเทพ" />
              <label style="display:flex; align-items:center; gap:8px; margin-top:14px;">
                <input type="checkbox" id="nfPR" checked />
                <span>เปิดใช้ Peer Review (มีกลุ่ม โหวตคะแนน เช็คชื่อ)</span>
              </label>
              <div id="prOptions">
                <label>จำนวนกลุ่ม</label>
                <input type="number" id="nfGroupCount" value="4" min="2" max="20" />
                <label>วิธีการจัดกลุ่ม</label>
                <div class="mode-options">
                  <label class="mode-opt">
                    <input type="radio" name="nfMode" value="self" checked />
                    <div>
                      <b>ผู้เรียนเลือกกลุ่มเอง</b>
                      <span>นักศึกษากดเลือกกลุ่มที่ต้องการตอนลงทะเบียน</span>
                    </div>
                  </label>
                  <label class="mode-opt">
                    <input type="radio" name="nfMode" value="random" />
                    <div>
                      <b>สุ่มอัตโนมัติ</b>
                      <span>ระบบสุ่มกลุ่มให้แต่ละคนตอนลงทะเบียน (กระจายเท่ากัน)</span>
                    </div>
                  </label>
                  <label class="mode-opt">
                    <input type="radio" name="nfMode" value="admin" />
                    <div>
                      <b>ผู้สอนกำหนดให้ภายหลัง</b>
                      <span>นักศึกษาลงทะเบียนก่อน แล้วผู้สอนกำหนดกลุ่มเอง</span>
                    </div>
                  </label>
                </div>
              </div>
              <button type="submit" class="primary">สร้างห้องเรียน</button>
              <div id="nfMsg"></div>
            </form>
          </div>
        </div>
      `;
      const close = () => { root.innerHTML = ''; };
      document.getElementById('closeModal').onclick = close;
      document.getElementById('modalBg').onclick = (e) => { if (e.target.id === 'modalBg') close(); };
      // Toggle prOptions visibility based on PR checkbox
      const prCheck = document.getElementById('nfPR');
      const prOpts = document.getElementById('prOptions');
      prCheck.onchange = () => { prOpts.style.display = prCheck.checked ? '' : 'none'; };
      document.getElementById('newForm').onsubmit = async (e) => {
        e.preventDefault();
        const mode = document.querySelector('input[name="nfMode"]:checked').value;
        const payload = {
          code: document.getElementById('nfCode').value.trim(),
          name: document.getElementById('nfName').value.trim(),
          description: document.getElementById('nfDesc').value.trim(),
          university: document.getElementById('nfUni').value.trim(),
          peerReviewEnabled: prCheck.checked,
          groupCount: parseInt(document.getElementById('nfGroupCount').value) || 4,
          groupAssignmentMode: mode
        };
        const res = await authFetch('/api/admin/classrooms', {
          method: 'POST',
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (!res.ok) {
          document.getElementById('nfMsg').innerHTML = `<div class="message error">${escapeHtml(data.error)}</div>`;
          return;
        }
        close();
        await loadClassrooms();
      };
    };

    // ==================== Classroom admin view ====================

    let currentClass = null;

    async function initClassView() {
      await Promise.all([loadClassMeta(), loadUsers(), loadScores()]);
    }

    async function loadClassMeta() {
      const res = await authFetch(`/api/admin/classrooms`);
      if (res.status === 401) { logout(); return; }
      const { classrooms } = await res.json();
      const c = classrooms.find(x => x.id === cid);
      if (!c) {
        classView.innerHTML = `<div class="message error">ไม่พบห้องเรียน</div>`;
        return;
      }
      currentClass = c;
      document.getElementById('cTitle').textContent = `${c.code} — ${c.name}`;
      document.getElementById('cSubtitle').textContent = `${c.university || ''}`;
      document.getElementById('regLink').href = `/c/${c.id}`;
      document.getElementById('dashLink').href = `/c/${c.id}/dashboard`;
      const regEl = document.getElementById('regState');
      const voteEl = document.getElementById('voteState');
      regEl.textContent = c.registrationOpen ? 'เปิด' : 'ปิด';
      regEl.className = 'vote-state ' + (c.registrationOpen ? 'open' : 'closed');
      voteEl.textContent = c.votingOpen ? 'เปิด' : 'ปิด';
      voteEl.className = 'vote-state ' + (c.votingOpen ? 'open' : 'closed');
      const tv = document.getElementById('toggleVote');
      tv.textContent = c.votingOpen ? 'ปิดการโหวต' : 'เปิดให้โหวต';
      tv.className = c.votingOpen ? 'danger' : 'success';
    }

    document.getElementById('toggleVote').onclick = async () => {
      const r = await authFetch(`/api/c/${cid}/admin/toggle-voting`, { method: 'POST' });
      if (!r.ok) { alert('error'); return; }
      await loadClassMeta();
    };
    document.getElementById('toggleReg').onclick = async () => {
      const r = await authFetch(`/api/c/${cid}/admin/toggle-registration`, { method: 'POST' });
      if (!r.ok) { alert('error'); return; }
      await loadClassMeta();
    };
    document.getElementById('randomizeBtn').onclick = async () => {
      if (!confirm('สุ่มกลุ่มใหม่ให้นักศึกษาทุกคน? (กลุ่มเดิมจะถูกเขียนทับ)')) return;
      const r = await authFetch(`/api/c/${cid}/admin/randomize-groups`, { method: 'POST' });
      const data = await r.json();
      if (!r.ok) { alert(data.error || 'error'); return; }
      alert(`สุ่มกลุ่มให้นักศึกษา ${data.assigned} คนเรียบร้อย`);
      await initClassView();
    };

    async function downloadFile(url, defaultName) {
      const res = await authFetch(url);
      if (!res.ok) { alert('เกิดข้อผิดพลาด'); return; }
      const blob = await res.blob();
      const dispo = res.headers.get('Content-Disposition') || '';
      const m = dispo.match(/filename="([^"]+)"/);
      const filename = m ? m[1] : defaultName;
      const objUrl = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = objUrl; a.download = filename; a.click();
      URL.revokeObjectURL(objUrl);
    }

    document.getElementById('exportBtn').onclick = () =>
      downloadFile(`/api/c/${cid}/admin/export`, `${cid}-scores.csv`);
    document.getElementById('exportJsonBtn').onclick = () =>
      downloadFile(`/api/c/${cid}/admin/export-json`, `${cid}-data.json`);

    document.getElementById('resetVotesBtn').onclick = async () => {
      if (!confirm('ล้างคะแนนโหวตทั้งหมดในห้องนี้?')) return;
      await authFetch(`/api/c/${cid}/admin/reset`, { method: 'POST', body: JSON.stringify({ what: 'votes' }) });
      await initClassView();
    };
    document.getElementById('resetAllBtn').onclick = async () => {
      if (!confirm('ล้างข้อมูลทั้งหมดของห้องนี้ รวมถึงรายชื่อ และรูป? การกระทำนี้ย้อนกลับไม่ได้')) return;
      await authFetch(`/api/c/${cid}/admin/reset`, { method: 'POST', body: JSON.stringify({ what: 'all' }) });
      await initClassView();
    };

    document.querySelectorAll('.tab').forEach(t => {
      t.onclick = () => {
        document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
        t.classList.add('active');
        document.getElementById('usersTab').style.display = t.dataset.tab === 'users' ? '' : 'none';
        document.getElementById('scoresTab').style.display = t.dataset.tab === 'scores' ? '' : 'none';
        document.getElementById('assignmentsTab').style.display = t.dataset.tab === 'assignments' ? '' : 'none';
        if (t.dataset.tab === 'assignments') loadAssignmentsAdmin();
      };
    });

    async function loadAssignmentsAdmin() {
      const res = await authFetch(`/api/c/${cid}/admin/assignments`);
      if (res.status === 401) { logout(); return; }
      const { assignments } = await res.json();
      const el = document.getElementById('assignmentsTab');
      let html = `
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;">
          <p class="hint" style="margin:0;">รวม ${assignments.length} งาน</p>
          <button class="primary" id="newAssignBtn" style="margin:0;">+ สร้างงานใหม่</button>
        </div>
      `;
      if (assignments.length === 0) {
        html += `<div class="empty-state">ยังไม่มีงาน</div>`;
      } else {
        html += assignments.map(a => `
          <div class="card" data-aid="${a.id}">
            <div style="display:flex; justify-content:space-between; align-items:flex-start; gap: 12px; flex-wrap: wrap;">
              <div style="flex:1; min-width: 240px;">
                <div style="font-size:16px; font-weight:600; color:#222;">
                  ${escapeHtml(a.title)}
                  ${a.type === 'group' ? '<span class="tag-group">งานกลุ่ม</span>' : '<span class="tag-individual">งานเดี่ยว</span>'}
                  ${a.isOpen ? '<span class="badge-success">เปิดรับ</span>' : '<span class="badge-pending">ปิด</span>'}
                </div>
                ${a.description ? `<div style="margin-top:6px; color:#666; font-size:13px;">${escapeHtml(a.description)}</div>` : ''}
                <div class="hint" style="margin-top:6px;">
                  ${a.dueDate ? `กำหนดส่ง: ${formatDate(a.dueDate)} · ` : ''}
                  สร้าง: ${formatDate(a.createdAt)} · ส่งแล้ว ${a.submissionCount} รายการ
                </div>
              </div>
              <div class="cr-actions">
                <button class="secondary" data-act="view" data-id="${a.id}">ดูที่ส่ง</button>
                <button class="secondary" data-act="toggle" data-id="${a.id}">${a.isOpen ? 'ปิดรับ' : 'เปิดรับ'}</button>
                <button class="danger" data-act="delete" data-id="${a.id}">ลบ</button>
              </div>
            </div>
          </div>
        `).join('');
      }
      el.innerHTML = html;
      document.getElementById('newAssignBtn').onclick = openNewAssignModal;
      el.querySelectorAll('button[data-act]').forEach(b => {
        b.onclick = async () => {
          const id = b.dataset.id;
          const act = b.dataset.act;
          if (act === 'delete') {
            if (!confirm('ลบงานนี้และข้อมูลที่ส่งทั้งหมด?')) return;
            await authFetch(`/api/c/${cid}/admin/assignments/${id}`, { method: 'DELETE' });
            loadAssignmentsAdmin();
          } else if (act === 'toggle') {
            const cur = assignments.find(x => x.id == id);
            await authFetch(`/api/c/${cid}/admin/assignments/${id}`, {
              method: 'PATCH', body: JSON.stringify({ isOpen: !cur.isOpen })
            });
            loadAssignmentsAdmin();
          } else if (act === 'view') {
            await viewSubmissions(id);
          }
        };
      });
    }

    function openNewAssignModal() {
      const root = document.getElementById('modalRoot');
      root.innerHTML = `
        <div class="modal-backdrop" id="modalBg">
          <div class="modal" onclick="event.stopPropagation()">
            <button class="secondary modal-close" id="closeModal">ปิด</button>
            <h3>สร้างงานใหม่</h3>
            <form id="aForm">
              <label>ชื่องาน</label>
              <input type="text" id="aTitle" required />
              <label>คำอธิบาย</label>
              <textarea id="aDesc" rows="3" placeholder="ไม่บังคับ"></textarea>
              <label>ประเภท</label>
              <div class="mode-options">
                <label class="mode-opt">
                  <input type="radio" name="aType" value="individual" checked />
                  <div><b>งานเดี่ยว</b><span>นักศึกษาแต่ละคนส่งของตัวเอง</span></div>
                </label>
                <label class="mode-opt">
                  <input type="radio" name="aType" value="group" />
                  <div><b>งานกลุ่ม</b><span>ทุกคนในกลุ่มมีงานชิ้นเดียวกัน — ใครส่งก่อนได้</span></div>
                </label>
              </div>
              <label>กำหนดส่ง (ไม่บังคับ)</label>
              <input type="datetime-local" id="aDue" />
              <button type="submit" class="primary">สร้างงาน</button>
              <div id="aMsg"></div>
            </form>
          </div>
        </div>
      `;
      const close = () => { document.getElementById('modalRoot').innerHTML = ''; };
      document.getElementById('closeModal').onclick = close;
      document.getElementById('modalBg').onclick = (e) => { if (e.target.id === 'modalBg') close(); };
      document.getElementById('aForm').onsubmit = async (e) => {
        e.preventDefault();
        const due = document.getElementById('aDue').value;
        const payload = {
          title: document.getElementById('aTitle').value.trim(),
          description: document.getElementById('aDesc').value.trim(),
          type: document.querySelector('input[name="aType"]:checked').value,
          dueDate: due ? new Date(due).toISOString() : ''
        };
        const r = await authFetch(`/api/c/${cid}/admin/assignments`, {
          method: 'POST', body: JSON.stringify(payload)
        });
        const data = await r.json();
        if (!r.ok) {
          document.getElementById('aMsg').innerHTML = `<div class="message error">${escapeHtml(data.error)}</div>`;
          return;
        }
        close();
        loadAssignmentsAdmin();
      };
    }

    async function viewSubmissions(aid) {
      const r = await authFetch(`/api/c/${cid}/admin/assignments/${aid}/submissions`);
      const data = await r.json();
      const a = data.assignment;
      const subs = data.submissions || [];
      const root = document.getElementById('modalRoot');
      const rows = subs.length === 0
        ? '<tr><td colspan="6" style="text-align:center;color:#888;padding:20px;">ยังไม่มีคนส่ง</td></tr>'
        : subs.map(s => `
            <tr>
              <td>${s.submitterSelfie ? `<img class="thumb" src="${escapeHtml(s.submitterSelfie)}" />` : `<div class="thumb no-photo">?</div>`}</td>
              <td>${escapeHtml(s.studentId)}</td>
              <td>${escapeHtml(s.submitterFullName || s.submitterName)}</td>
              <td>${s.groupNum ? `กลุ่ม ${escapeHtml(s.groupNum)}` : '-'}</td>
              <td style="font-size:12px; max-width: 280px;">
                ${s.content ? `<div>${escapeHtml(s.content)}</div>` : ''}
                ${s.link ? `<div><a href="${escapeHtml(s.link)}" target="_blank">🔗 ${escapeHtml(s.link)}</a></div>` : ''}
                ${s.fileUrl ? `<div><a href="${escapeHtml(s.fileUrl)}" target="_blank">📎 ${escapeHtml(s.fileName || 'ไฟล์')}</a></div>` : ''}
              </td>
              <td style="font-size:12px;">${formatDate(s.submittedAt)}</td>
            </tr>
          `).join('');
      root.innerHTML = `
        <div class="modal-backdrop" id="modalBg">
          <div class="modal" style="max-width:900px;" onclick="event.stopPropagation()">
            <button class="secondary modal-close" id="closeModal">ปิด</button>
            <h3>${escapeHtml(a.title)}</h3>
            <p class="hint">${a.type === 'group' ? 'งานกลุ่ม' : 'งานเดี่ยว'} · ส่งแล้ว ${subs.length} รายการ</p>
            <table>
              <thead><tr><th>รูป</th><th>รหัส</th><th>ผู้ส่ง</th><th>กลุ่ม</th><th>เนื้อหา</th><th>เวลา</th></tr></thead>
              <tbody>${rows}</tbody>
            </table>
          </div>
        </div>
      `;
      document.getElementById('closeModal').onclick = () => { root.innerHTML = ''; };
      document.getElementById('modalBg').onclick = (e) => { if (e.target.id === 'modalBg') root.innerHTML = ''; };
    }

    async function loadUsers() {
      const res = await authFetch(`/api/c/${cid}/admin/users`);
      if (res.status === 401) { logout(); return; }
      const { grouped, users, classDates, classroom } = await res.json();
      const el = document.getElementById('usersTab');
      if (users.length === 0) {
        el.innerHTML = `<div class="empty-state">ยังไม่มีผู้ลงทะเบียน</div>`;
        return;
      }
      const dates = classDates || [];
      const validGroups = (classroom && classroom.validGroups) || [];
      const groupNames = Object.keys(grouped).sort((a, b) => a.localeCompare(b));
      let html = `<p class="hint">รวม ${users.length} คน · ${groupNames.length} กลุ่ม · จัดกลุ่มแบบ <b>${escapeHtml(modeLabel(classroom && classroom.groupAssignmentMode))}</b> · คลิก dropdown ในคอลัมน์กลุ่มเพื่อย้ายคน</p>`;
      groupNames.forEach(g => {
        html += `
          <div class="group-section">
            <div class="group-title">กลุ่ม ${escapeHtml(g)} (${grouped[g].length} คน)</div>
            <table>
              <thead>
                <tr>
                  <th>รูป</th>
                  <th>รหัส</th>
                  <th>ชื่อ-นามสกุล</th>
                  <th>ชื่อเล่น</th>
                  <th>กลุ่ม</th>
                  <th>เวลาลงทะเบียน</th>
                  <th>วันที่มาเรียน</th>
                  <th>คะแนนที่ได้รับ</th>
                </tr>
              </thead>
              <tbody>
                ${grouped[g].map(u => {
                  const att = Array.isArray(u.attendance) ? u.attendance : [];
                  const tags = dates.length === 0
                    ? '-'
                    : (u.attendance === undefined
                        ? '<span style="color:#aaa;font-size:13px;">ยังไม่ได้ส่ง</span>'
                        : dates.map(d => att.includes(d.id)
                            ? `<span class="attend-tag">${escapeHtml(d.label)}</span>`
                            : `<span class="attend-tag absent">${escapeHtml(d.label)}</span>`).join(' '));
                  const photo = u.selfie
                    ? `<img class="thumb" src="${escapeHtml(u.selfie)}" alt="" />`
                    : `<div class="thumb no-photo">?</div>`;
                  const groupSelect = `
                    <select class="group-select" data-id="${escapeHtml(u.studentId)}">
                      <option value="" ${!u.group ? 'selected' : ''}>—</option>
                      ${validGroups.map(g2 => `<option value="${escapeHtml(g2)}" ${u.group === g2 ? 'selected' : ''}>${escapeHtml(g2)}</option>`).join('')}
                    </select>
                  `;
                  return `
                    <tr>
                      <td>${photo}</td>
                      <td>${escapeHtml(u.studentId)}</td>
                      <td>${escapeHtml((u.firstName || '') + ' ' + (u.lastName || ''))}</td>
                      <td>${escapeHtml(u.nickname || '-')}</td>
                      <td>${groupSelect}</td>
                      <td>${formatDate(u.registeredAt)}</td>
                      <td>${tags}</td>
                      <td><button class="secondary view-votes-btn" data-id="${escapeHtml(u.studentId)}">ดูคะแนน</button></td>
                    </tr>
                  `;
                }).join('')}
              </tbody>
            </table>
          </div>
        `;
      });
      el.innerHTML = html;
      el.querySelectorAll('.view-votes-btn').forEach(b => {
        b.onclick = () => showVoteDetails(b.dataset.id);
      });
      el.querySelectorAll('.group-select').forEach(sel => {
        sel.onchange = async () => {
          const studentId = sel.dataset.id;
          const newGroup = sel.value;
          const r = await authFetch(`/api/c/${cid}/admin/set-group`, {
            method: 'POST',
            body: JSON.stringify({ studentId, group: newGroup })
          });
          if (!r.ok) {
            const data = await r.json().catch(() => ({}));
            alert(data.error || 'เปลี่ยนกลุ่มไม่สำเร็จ');
          }
          await loadUsers();
        };
      });
    }

    async function loadScores() {
      const res = await authFetch(`/api/c/${cid}/admin/scores`);
      if (!res.ok) return;
      const { scores, classDates, attendancePercent } = await res.json();
      const el = document.getElementById('scoresTab');
      if (scores.length === 0) {
        el.innerHTML = `<div class="empty-state">ยังไม่มีข้อมูล</div>`;
        return;
      }
      const dates = classDates || [];
      const pct = attendancePercent || 5;
      const groups = {};
      scores.forEach(s => { const k = s.group || '(ไม่มีกลุ่ม)'; if (!groups[k]) groups[k] = []; groups[k].push(s); });
      const groupNames = Object.keys(groups).sort((a, b) => a.localeCompare(b));
      let html = `<p class="hint">คะแนนโหวต = <b>Mode</b> · คะแนนเข้าเรียน = ${pct}% × วัน (เต็ม ${pct * dates.length}%)</p>`;
      const dateHeaders = dates.map(d => `<th>${escapeHtml(d.label)}</th>`).join('');
      groupNames.forEach(g => {
        html += `
          <div class="group-section">
            <div class="group-title">กลุ่ม ${escapeHtml(g)}</div>
            <table>
              <thead>
                <tr>
                  <th>รูป</th><th>รหัส</th><th>ชื่อ</th><th>ผู้โหวต</th>
                  <th>Mode</th><th>คะแนนทั้งหมด</th>
                  ${dateHeaders}
                  <th>เข้าเรียน</th><th>คะแนนเข้าเรียน</th>
                </tr>
              </thead>
              <tbody>
                ${groups[g].map(s => {
                  const cells = dates.map(d => {
                    const ok = (s.attendance || []).includes(d.id);
                    return `<td style="text-align:center;">${ok ? '✓' : '<span style="color:#ccc;">–</span>'}</td>`;
                  }).join('');
                  const photo = s.selfie
                    ? `<img class="thumb" src="${escapeHtml(s.selfie)}" alt="" />`
                    : `<div class="thumb no-photo">?</div>`;
                  return `
                    <tr>
                      <td>${photo}</td>
                      <td>${escapeHtml(s.studentId)}</td>
                      <td>${escapeHtml(s.fullName)}${s.nickname ? ` <span style="color:#888;">(${escapeHtml(s.nickname)})</span>` : ''}</td>
                      <td>${s.voteCount}</td>
                      <td>${s.voteCount > 0 ? `<span class="score-pill">${escapeHtml(s.modeScore)}</span>` : '-'}</td>
                      <td style="color:#777; font-size:13px;">${s.scores.join(', ') || '-'}</td>
                      ${cells}
                      <td style="text-align:center;">${s.attendanceCount}/${dates.length}</td>
                      <td style="text-align:center;font-weight:600;color:#4555a6;">${s.attendanceScore}%</td>
                    </tr>
                  `;
                }).join('')}
              </tbody>
            </table>
          </div>
        `;
      });
      el.innerHTML = html;
    }

    async function showVoteDetails(studentId) {
      const res = await authFetch(`/api/c/${cid}/admin/votes/${encodeURIComponent(studentId)}`);
      const data = await res.json();
      const root = document.getElementById('modalRoot');
      const u = data.user;
      const rows = data.votes.length > 0
        ? data.votes.map(v => `
            <tr>
              <td>${escapeHtml(v.voterId)}</td>
              <td>${escapeHtml(v.voterName)}</td>
              <td><span class="score-pill">${v.score}</span></td>
              <td style="color:#888;font-size:13px;">${formatDate(v.timestamp)}</td>
            </tr>`).join('')
        : `<tr><td colspan="4" style="text-align:center;color:#888;padding:20px;">ยังไม่มีคนโหวต</td></tr>`;
      const fullName = `${u.firstName || ''} ${u.lastName || ''}`.trim() || u.name || u.studentId;
      root.innerHTML = `
        <div class="modal-backdrop" id="modalBg">
          <div class="modal" onclick="event.stopPropagation()">
            <button class="secondary modal-close" id="closeModal">ปิด</button>
            <h3>คะแนนโหวตของ ${escapeHtml(fullName)} (${escapeHtml(u.studentId)})</h3>
            <p class="hint" style="margin-bottom: 14px;">
              กลุ่ม ${escapeHtml(u.group || '-')} · ผู้โหวต ${data.count} คน · Mode: <b>${data.count > 0 ? escapeHtml(data.mode) : '-'}</b>
            </p>
            <table>
              <thead><tr><th>รหัส</th><th>ชื่อ</th><th>คะแนน</th><th>เวลา</th></tr></thead>
              <tbody>${rows}</tbody>
            </table>
          </div>
        </div>
      `;
      document.getElementById('modalBg').onclick = (e) => { if (e.target.id === 'modalBg') root.innerHTML = ''; };
      document.getElementById('closeModal').onclick = () => { root.innerHTML = ''; };
    }

    // Auto-refresh class view every 5s
    setInterval(() => {
      if (cid && classView.style.display !== 'none' && token) {
        loadClassMeta(); loadUsers(); loadScores();
      }
    }, 5000);
  </script>
</body>
</html>
