<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ระบบหลังบ้าน</title>
  <link rel="stylesheet" href="/style.css?v=10" />
</head>
<body>
  <div id="loginView" class="container">
    <h1>เข้าสู่ระบบสำหรับผู้ดูแล</h1>
    <p class="subtitle">กรุณาใส่ข้อมูลผู้ดูแลระบบ</p>
    <form id="loginForm">
      <label>ชื่อผู้ใช้</label>
      <input type="text" id="username" required />
      <label>รหัสผ่าน</label>
      <input type="password" id="password" required />
      <button type="submit" class="primary">เข้าสู่ระบบ</button>
    </form>
    <div id="loginMsg"></div>
    <p class="hint" style="margin-top: 24px; text-align: center;">
      <a href="/" style="color: #888;">← กลับหน้าหลัก</a>
    </p>
  </div>

  <!-- Super-admin view: list classrooms -->
  <div id="superView" class="container wide" style="display: none;">
    <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px;">
      <div>
        <h1>จัดการห้องเรียน</h1>
        <p class="subtitle" style="margin: 0;">สร้าง / แก้ไข / ลบห้องเรียน</p>
      </div>
      <div style="display:flex; gap:8px; flex-wrap: wrap;">
        <button id="newClassBtn" class="primary" style="margin:0;">+ สร้างห้องเรียนใหม่</button>
        <button class="secondary" id="logoutBtn1">ออกจากระบบ</button>
      </div>
    </div>

    <div id="classroomsList" style="margin-top: 24px;">
      <p class="hint">กำลังโหลด...</p>
    </div>
  </div>

  <!-- Classroom admin view -->
  <div id="classView" class="container wide" style="display: none;">
    <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px;">
      <div>
        <a href="/admin" style="color:#888; font-size:13px; text-decoration:none;">← จัดการห้องเรียน</a>
        <h1 id="cTitle" style="margin-top: 4px;">-</h1>
        <p class="subtitle" id="cSubtitle" style="margin: 0;">-</p>
      </div>
      <button class="secondary" id="logoutBtn2">ออกจากระบบ</button>
    </div>

    <div class="status-bar">
      <div class="status-grp">
        <span>การลงทะเบียน:
          <span id="regState" class="vote-state closed">-</span>
        </span>
        <span>การโหวต:
          <span id="voteState" class="vote-state closed">-</span>
        </span>
      </div>
      <div class="actions">
        <button id="toggleReg" class="secondary">เปิด/ปิด ลงทะเบียน</button>
        <button id="toggleVote" class="success">เปิดให้โหวต</button>
        <button id="randomizeBtn" class="secondary">สุ่มกลุ่มใหม่ทั้งหมด</button>
        <button id="settingsBtn" class="secondary">⚙ ตั้งค่าวิชา</button>
        <a id="dashLink" target="_blank" class="secondary" style="text-decoration:none;display:inline-block;padding:12px 24px;border-radius:8px;background:#f0f2f8;color:#444;font-size:15px;font-weight:500;">เปิด Dashboard</a>
        <a id="regLink" target="_blank" class="secondary" style="text-decoration:none;display:inline-block;padding:12px 24px;border-radius:8px;background:#f0f2f8;color:#444;font-size:15px;font-weight:500;">หน้าลงทะเบียน</a>
        <button id="exportBtn" class="secondary">Export CSV</button>
        <button id="exportJsonBtn" class="secondary">Export JSON</button>
        <button id="resetVotesBtn" class="danger">ล้างคะแนนโหวต</button>
        <button id="resetAllBtn" class="danger">ล้างข้อมูลทั้งหมด</button>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="users">รายชื่อผู้ลงทะเบียน</button>
      <button class="tab" data-tab="scores">คะแนนรวม (Mode)</button>
      <button class="tab" data-tab="assignments">งานที่มอบหมาย</button>
      <button class="tab" data-tab="schedule">ตารางเรียน</button>
    </div>

    <div id="usersTab" class="tab-content"></div>
    <div id="scoresTab" class="tab-content" style="display: none;"></div>
    <div id="assignmentsTab" class="tab-content" style="display: none;"></div>
    <div id="scheduleTab" class="tab-content" style="display: none;">
      <div class="sched-header">
        <button class="secondary" id="prevMonthBtn">◀</button>
        <h2 id="monthLabel" style="margin: 0; min-width: 220px; text-align: center;">-</h2>
        <button class="secondary" id="nextMonthBtn">▶</button>
        <button class="primary" id="todayBtn" style="margin-left: 8px;">วันนี้</button>
      </div>
      <p class="hint" style="text-align: center;">คลิกที่วันใดก็ได้เพื่อเพิ่ม / แก้ไขรายละเอียดวันเรียน</p>
      <div class="cal-grid" id="calGrid"></div>
      <h2 style="margin-top: 22px;">รายการวันเรียนทั้งหมด</h2>
      <div id="schedList"></div>
    </div>
  </div>

  <div id="modalRoot"></div>

  <script>
    const pathParts = window.location.pathname.split('/');
    // /admin → super; /c/:cid/admin → classroom view
    const cid = (pathParts[1] === 'c' && pathParts[3] === 'admin') ? pathParts[2] : null;

    let token = localStorage.getItem('pr_admin_token') || null;

    const loginView = document.getElementById('loginView');
    const superView = document.getElementById('superView');
    const classView = document.getElementById('classView');

    function escapeHtml(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }
    function modeLabel(m) {
      return ({ self: 'เลือกเอง', random: 'สุ่ม', admin: 'ผู้สอนกำหนด' })[m || 'self'] || m;
    }
    function defaultProfileFields() {
      return [
        { key: 'name',       label: 'ชื่อ - นามสกุล', enabled: true,  required: false },
        { key: 'nickname',   label: 'ชื่อเล่น',         enabled: true,  required: false },
        { key: 'studentId',  label: 'รหัสนักศึกษา',    enabled: true,  required: false },
        { key: 'faculty',    label: 'คณะ',              enabled: false, required: false },
        { key: 'department', label: 'สาขา',             enabled: false, required: false },
        { key: 'university', label: 'มหาวิทยาลัย',     enabled: false, required: false },
        { key: 'company',    label: 'บริษัท',           enabled: false, required: false },
        { key: 'position',   label: 'ตำแหน่ง',          enabled: false, required: false }
      ];
    }
    function renderProfileFieldsRows(containerId, fields) {
      const tbody = document.getElementById(containerId);
      tbody.innerHTML = fields.map(f => `
        <tr data-key="${f.key}">
          <td>${escapeHtml(f.label)}</td>
          <td style="text-align:center;">
            <label class="toggle-switch">
              <input type="checkbox" data-role="enabled" ${f.enabled ? 'checked' : ''} />
              <span class="toggle-slider"></span>
            </label>
          </td>
          <td style="text-align:center;">
            <label class="toggle-switch req">
              <input type="checkbox" data-role="required" ${f.required ? 'checked' : ''} ${f.enabled ? '' : 'disabled'} />
              <span class="toggle-slider"></span>
            </label>
          </td>
        </tr>
      `).join('');
      // Disable "required" when "enabled" is off
      tbody.querySelectorAll('tr[data-key]').forEach(tr => {
        const en = tr.querySelector('input[data-role="enabled"]');
        const req = tr.querySelector('input[data-role="required"]');
        en.onchange = () => {
          req.disabled = !en.checked;
          if (!en.checked) req.checked = false;
        };
      });
    }
    function collectProfileFields(containerId) {
      const tbody = document.getElementById(containerId);
      return Array.from(tbody.querySelectorAll('tr[data-key]')).map(tr => ({
        key: tr.dataset.key,
        enabled: tr.querySelector('input[data-role="enabled"]').checked,
        required: tr.querySelector('input[data-role="required"]').checked
      }));
    }
    function formatDate(iso) {
      if (!iso) return '-';
      return new Date(iso).toLocaleString('th-TH', { year: '2-digit', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
    }

    if (token) showAuthed();

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const msg = document.getElementById('loginMsg');
      msg.innerHTML = '';
      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (!res.ok) { msg.innerHTML = `<div class="message error">${escapeHtml(data.error)}</div>`; return; }
        token = data.token;
        localStorage.setItem('pr_admin_token', token);
        showAuthed();
      } catch (err) {
        msg.innerHTML = `<div class="message error">${escapeHtml(err.message)}</div>`;
      }
    });

    function logout() {
      localStorage.removeItem('pr_admin_token');
      token = null;
      superView.style.display = 'none';
      classView.style.display = 'none';
      loginView.style.display = '';
    }
    document.getElementById('logoutBtn1').onclick = logout;
    document.getElementById('logoutBtn2').onclick = logout;

    function authFetch(url, opts = {}) {
      return fetch(url, {
        ...opts,
        headers: {
          ...(opts.headers || {}),
          'X-Admin-Auth': token,
          ...(opts.body ? { 'Content-Type': 'application/json' } : {})
        }
      });
    }

    function showAuthed() {
      loginView.style.display = 'none';
      if (cid) {
        classView.style.display = '';
        initClassView();
      } else {
        superView.style.display = '';
        initSuperView();
      }
    }

    // ==================== Super-admin: classroom management ====================

    async function initSuperView() {
      await loadClassrooms();
    }

    async function loadClassrooms() {
      const res = await authFetch('/api/admin/classrooms');
      if (res.status === 401) { logout(); return; }
      const { classrooms } = await res.json();
      const el = document.getElementById('classroomsList');
      if (!classrooms.length) {
        el.innerHTML = `<div class="empty-state">ยังไม่มีห้องเรียน — กดปุ่ม "สร้างห้องเรียนใหม่" ด้านบน</div>`;
        return;
      }
      el.innerHTML = classrooms.map(c => `
        <div class="classroom-row card">
          <div class="cr-main">
            <div class="cr-code">${escapeHtml(c.code)}</div>
            <div class="cr-name">${escapeHtml(c.name)}</div>
            <div class="cr-uni">${escapeHtml(c.university || '')}</div>
            ${c.description ? `<div class="cr-desc">${escapeHtml(c.description)}</div>` : ''}
            <div class="cr-meta">
              <span>นักศึกษา <b>${c.studentCount}</b> คน</span>
              <span>โหวต <b>${c.voteCount}</b> รายการ</span>
              <span class="${c.registrationOpen ? 'open' : 'closed'}">${c.registrationOpen ? '● ลงทะเบียน เปิด' : '○ ลงทะเบียน ปิด'}</span>
              <span class="${c.votingOpen ? 'open' : 'closed'}">${c.votingOpen ? '● โหวต เปิด' : '○ โหวต ปิด'}</span>
              ${c.peerReviewEnabled ? `<span class="tag-pr">Peer Review · ${c.validGroups.length} กลุ่ม · ${modeLabel(c.groupAssignmentMode)}</span>` : ''}
              <span class="enroll-pill" title="รหัส 4 หลัก สำหรับนักศึกษาเข้าคลาส">🔑 รหัสคลาส: <b>${escapeHtml(c.enrollCode || '----')}</b></span>
            </div>
            <div class="cr-meta" style="margin-top: 6px;">
              <label class="visibility-toggle">
                <span style="font-size: 12px; color: #555;">แสดงบนหน้าแรก:</span>
                <span class="toggle-switch" style="margin-left: 4px;">
                  <input type="checkbox" data-vis="${escapeHtml(c.id)}" ${c.isPublic ? 'checked' : ''} />
                  <span class="toggle-slider"></span>
                </span>
                <span class="vis-label" style="font-size:12px; color:${c.isPublic ? '#27ae60' : '#888'};">
                  ${c.isPublic ? 'แสดง' : 'ซ่อน (เข้าได้เฉพาะลิงก์ตรง)'}
                </span>
              </label>
            </div>
          </div>
          <div class="cr-actions">
            <a href="/c/${escapeHtml(c.id)}/admin" class="primary" style="text-decoration:none;display:inline-block;padding:10px 18px;border-radius:8px;background:#667eea;color:#fff;font-size:14px;font-weight:500;">จัดการ</a>
            <a href="/c/${escapeHtml(c.id)}" target="_blank" class="secondary" style="text-decoration:none;display:inline-block;padding:10px 18px;border-radius:8px;background:#f0f2f8;color:#444;font-size:14px;">หน้าลงทะเบียน</a>
            <a href="/c/${escapeHtml(c.id)}/dashboard" target="_blank" class="secondary" style="text-decoration:none;display:inline-block;padding:10px 18px;border-radius:8px;background:#f0f2f8;color:#444;font-size:14px;">Dashboard</a>
            <button class="secondary" data-regen="${escapeHtml(c.id)}">สุ่มรหัสคลาส</button>
            <button class="danger" data-del="${escapeHtml(c.id)}">ลบ</button>
          </div>
        </div>
      `).join('');
      el.querySelectorAll('button[data-del]').forEach(b => {
        b.onclick = async () => {
          const id = b.dataset.del;
          if (!confirm(`ลบห้องเรียน "${id}" และข้อมูลทั้งหมด? การกระทำนี้ย้อนกลับไม่ได้`)) return;
          await authFetch(`/api/admin/classrooms/${id}`, { method: 'DELETE' });
          await loadClassrooms();
        };
      });
      el.querySelectorAll('button[data-regen]').forEach(b => {
        b.onclick = async () => {
          const id = b.dataset.regen;
          if (!confirm(`สุ่มรหัสคลาสใหม่สำหรับ "${id}"? รหัสเดิมจะใช้ไม่ได้`)) return;
          const r = await authFetch(`/api/admin/classrooms/${id}/regenerate-enroll-code`, { method: 'POST' });
          const data = await r.json();
          if (r.ok) alert(`รหัสคลาสใหม่: ${data.enrollCode}`);
          await loadClassrooms();
        };
      });
      el.querySelectorAll('input[data-vis]').forEach(input => {
        input.onchange = async () => {
          const id = input.dataset.vis;
          const r = await authFetch(`/api/admin/classrooms/${id}`, {
            method: 'PATCH',
            body: JSON.stringify({ isPublic: input.checked })
          });
          if (!r.ok) {
            input.checked = !input.checked;
            alert('เปลี่ยนสถานะไม่สำเร็จ');
            return;
          }
          // Update label without full reload
          const label = input.closest('.visibility-toggle').querySelector('.vis-label');
          if (label) {
            label.textContent = input.checked ? 'แสดง' : 'ซ่อน (เข้าได้เฉพาะลิงก์ตรง)';
            label.style.color = input.checked ? '#27ae60' : '#888';
          }
        };
      });
    }

    document.getElementById('newClassBtn').onclick = () => {
      const root = document.getElementById('modalRoot');
      root.innerHTML = `
        <div class="modal-backdrop" id="modalBg">
          <div class="modal" onclick="event.stopPropagation()">
            <button class="secondary modal-close" id="closeModal">ปิด</button>
            <h3>สร้างห้องเรียนใหม่</h3>
            <form id="newForm">
              <label>รหัสวิชา (เช่น GE 207)</label>
              <input type="text" id="nfCode" required />
              <label>ชื่อวิชา</label>
              <input type="text" id="nfName" required />
              <label>คำอธิบายรายวิชา</label>
              <input type="text" id="nfDesc" placeholder="ไม่บังคับ" />
              <label>มหาวิทยาลัย</label>
              <input type="text" id="nfUni" value="มหาวิทยาลัยกรุงเทพ" />
              <label style="display:flex; align-items:center; gap:8px; margin-top:14px;">
                <input type="checkbox" id="nfPR" checked />
                <span>เปิดใช้ Peer Review (มีกลุ่ม โหวตคะแนน เช็คชื่อ)</span>
              </label>

              <h3 style="margin-top: 18px;">ข้อมูลที่ขอจากผู้ลงทะเบียน</h3>
              <p class="hint" style="margin: 0 0 8px;">เลือกฟิลด์ที่ต้องการเก็บ และระบุว่าบังคับหรือไม่</p>
              <table class="profile-fields-table">
                <thead><tr><th>ฟิลด์</th><th>เก็บ</th><th>บังคับ</th></tr></thead>
                <tbody id="nfProfileFields"></tbody>
              </table>

              <div id="prOptions">
                <label>จำนวนกลุ่ม</label>
                <input type="number" id="nfGroupCount" value="4" min="2" max="20" />
                <label>วิธีการจัดกลุ่ม</label>
                <div class="mode-options">
                  <label class="mode-opt">
                    <input type="radio" name="nfMode" value="self" checked />
                    <div>
                      <b>ผู้เรียนเลือกกลุ่มเอง</b>
                      <span>นักศึกษากดเลือกกลุ่มที่ต้องการตอนลงทะเบียน</span>
                    </div>
                  </label>
                  <label class="mode-opt">
                    <input type="radio" name="nfMode" value="random" />
                    <div>
                      <b>สุ่มอัตโนมัติ</b>
                      <span>ระบบสุ่มกลุ่มให้แต่ละคนตอนลงทะเบียน (กระจายเท่ากัน)</span>
                    </div>
                  </label>
                  <label class="mode-opt">
                    <input type="radio" name="nfMode" value="admin" />
                    <div>
                      <b>ผู้สอนกำหนดให้ภายหลัง</b>
                      <span>นักศึกษาลงทะเบียนก่อน แล้วผู้สอนกำหนดกลุ่มเอง</span>
                    </div>
                  </label>
                </div>
              </div>
              <button type="submit" class="primary">สร้างห้องเรียน</button>
              <div id="nfMsg"></div>
            </form>
          </div>
        </div>
      `;
      const close = () => { root.innerHTML = ''; };
      document.getElementById('closeModal').onclick = close;
      document.getElementById('modalBg').onclick = (e) => { if (e.target.id === 'modalBg') close(); };
      // Toggle prOptions visibility based on PR checkbox
      const prCheck = document.getElementById('nfPR');
      const prOpts = document.getElementById('prOptions');
      prCheck.onchange = () => { prOpts.style.display = prCheck.checked ? '' : 'none'; };
      // Render default profileFields rows
      renderProfileFieldsRows('nfProfileFields', defaultProfileFields());
      document.getElementById('newForm').onsubmit = async (e) => {
        e.preventDefault();
        const mode = document.querySelector('input[name="nfMode"]:checked').value;
        const payload = {
          code: document.getElementById('nfCode').value.trim(),
          name: document.getElementById('nfName').value.trim(),
          description: document.getElementById('nfDesc').value.trim(),
          university: document.getElementById('nfUni').value.trim(),
          peerReviewEnabled: prCheck.checked,
          groupCount: parseInt(document.getElementById('nfGroupCount').value) || 4,
          groupAssignmentMode: mode,
          profileFields: collectProfileFields('nfProfileFields')
        };
        const res = await authFetch('/api/admin/classrooms', {
          method: 'POST',
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (!res.ok) {
          document.getElementById('nfMsg').innerHTML = `<div class="message error">${escapeHtml(data.error)}</div>`;
          return;
        }
        close();
        await loadClassrooms();
      };
    };

    // ==================== Classroom admin view ====================

    let currentClass = null;

    async function initClassView() {
      await Promise.all([loadClassMeta(), loadUsers(), loadScores()]);
    }

    async function loadClassMeta() {
      const res = await authFetch(`/api/admin/classrooms`);
      if (res.status === 401) { logout(); return; }
      const { classrooms } = await res.json();
      const c = classrooms.find(x => x.id === cid);
      if (!c) {
        classView.innerHTML = `<div class="message error">ไม่พบห้องเรียน</div>`;
        return;
      }
      currentClass = c;
      document.getElementById('cTitle').textContent = `${c.code} — ${c.name}`;
      document.getElementById('cSubtitle').textContent = `${c.university || ''}`;
      document.getElementById('regLink').href = `/c/${c.id}`;
      document.getElementById('dashLink').href = `/c/${c.id}/dashboard`;
      const regEl = document.getElementById('regState');
      const voteEl = document.getElementById('voteState');
      regEl.textContent = c.registrationOpen ? 'เปิด' : 'ปิด';
      regEl.className = 'vote-state ' + (c.registrationOpen ? 'open' : 'closed');
      voteEl.textContent = c.votingOpen ? 'เปิด' : 'ปิด';
      voteEl.className = 'vote-state ' + (c.votingOpen ? 'open' : 'closed');
      const tv = document.getElementById('toggleVote');
      tv.textContent = c.votingOpen ? 'ปิดการโหวต' : 'เปิดให้โหวต';
      tv.className = c.votingOpen ? 'danger' : 'success';
    }

    document.getElementById('toggleVote').onclick = async () => {
      const r = await authFetch(`/api/c/${cid}/admin/toggle-voting`, { method: 'POST' });
      if (!r.ok) { alert('error'); return; }
      await loadClassMeta();
    };
    document.getElementById('toggleReg').onclick = async () => {
      const r = await authFetch(`/api/c/${cid}/admin/toggle-registration`, { method: 'POST' });
      if (!r.ok) { alert('error'); return; }
      await loadClassMeta();
    };
    document.getElementById('settingsBtn').onclick = () => openSettingsModal();

    function openSettingsModal() {
      const c = currentClass || {};
      const fields = c.profileFields || defaultProfileFields();
      const root = document.getElementById('modalRoot');
      root.innerHTML = `
        <div class="modal-backdrop" id="modalBg">
          <div class="modal" style="max-width: 720px;" onclick="event.stopPropagation()">
            <button class="secondary modal-close" id="closeModal">ปิด</button>

              <div class="locked-info">

                <tbody id="sProfileRows"></tbody>

              <div id="sMsg"></div>

      `;
      const close = () => { root.innerHTML = ''; };
      document.getElementById('closeModal').onclick = close;
      document.getElementById('modalBg').onclick = (e) => { if (e.target.id === 'modalBg') close(); };
      renderProfileFieldsRows('sProfileRows', fields);

      document.getElementById('settingsForm').onsubmit = async (e) => {
        e.preventDefault();
        const payload = {
          code: document.getElementById('sCode').value.trim(),
          name: document.getElementById('sName').value.trim(),
          description: document.getElementById('sDesc').value.trim(),
          university: document.getElementById('sUni').value.trim(),
          peerReviewEnabled: document.getElementById('sPR').checked,
          profileFields: collectProfileFields('sProfileRows')
        };
        const r = await authFetch(`/api/admin/classrooms/${cid}`, {
          method: 'PATCH', body: JSON.stringify(payload)
        });
        const d = await r.json();
        if (!r.ok) {
          document.getElementById('sMsg').innerHTML = `<div class="message error">${escapeHtml(d.error || 'error')}</div>`;
          return;
        }
        currentClass = d.classroom;

    document.getElementById('randomizeBtn').onclick = async () => {
      if (!confirm('สุ่มกลุ่มใหม่ให้นักศึกษาทุกคน? (กลุ่มเดิมจะถูกเขียนทับ)')) return;
      const r = await authFetch(`/api/c/${cid}/admin/randomize-groups`, { method: 'POST' });
      const data = await r.json();
      if (!r.ok) { alert(data.error || 'error'); return; }
      alert(`สุ่มกลุ่มให้นักศึกษา ${data.assigned} คนเรียบร้อย`);
      await initClassView();
    };

    async function downloadFile(url, defaultName) {
      const res = await authFetch(url);
      if (!res.ok) { alert('เกิดข้อผิดพลาด'); return; }
      const blob = await res.blob();
      const dispo = res.headers.get('Content-Disposition') || '';
      const m = dispo.match(/filename="([^"]+)"/);
      const filename = m ? m[1] : defaultName;
      const objUrl = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = objUrl; a.download = filename; a.click();
      URL.revokeObjectURL(objUrl);
    }

    document.getElementById('exportBtn').onclick = () =>
      downloadFile(`/api/c/${cid}/admin/export`, `${cid}-scores.csv`);
    document.getElementById('exportJsonBtn').onclick = () =>
      downloadFile(`/api/c/${cid}/admin/export-json`, `${cid}-data.json`);

    document.getElementById('resetVotesBtn').onclick = async () => {
      if (!confirm('ล้างคะแนนโหวตทั้งหมดในห้องนี้?')) return;
      await authFetch(`/api/c/${cid}/admin/reset`, { method: 'POST', body: JSON.stringify({ what: 'votes' }) });
      await initClassView();
    };
    document.getElementById('resetAllBtn').onclick = async () => {
      if (!confirm('ล้างข้อมูลทั้งหมดของห้องนี้ รวมถึงรายชื่อ และรูป? การกระทำนี้ย้อนกลับไม่ได้')) return;
      await authFetch(`/api/c/${cid}/admin/reset`, { method: 'POST', body: JSON.stringify({ what: 'all' }) });
      await initClassView();
    };

    document.querySelectorAll('.tab').forEach(t => {
      t.onclick = () => {
        document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
        t.classList.add('active');
        document.getElementById('usersTab').style.display = t.dataset.tab === 'users' ? '' : 'none';
        document.getElementById('scoresTab').style.display = t.dataset.tab === 'scores' ? '' : 'none';
        document.getElementById('assignmentsTab').style.display = t.dataset.tab === 'assignments' ? '' : 'none';
        document.getElementById('scheduleTab').style.display = t.dataset.tab === 'schedule' ? '' : 'none';

    // ==================== Schedule (class dates with details) ====================

    let schedClassroom = null;
    let schedMonth = null;

    function pad2(n) { return String(n).padStart(2, '0'); }
    function dateIdToTH(id) {
      try {
        const d = new Date(id + 'T00:00:00');
        return d.toLocaleDateString('th-TH', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
      } catch (e) { return id; }
    }
    function dateIdToLabel(id) {
      try {
        const d = new Date(id + 'T00:00:00');
        return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      } catch (e) { return id; }
    }

    async function loadSchedule() {
      const res = await authFetch('/api/admin/classrooms');
      if (res.status === 401) { logout(); return; }
      const { classrooms } = await res.json();
      schedClassroom = classrooms.find(x => x.id === cid);
      if (!schedClassroom) return;
      if (!schedMonth) {
        const dates = (schedClassroom.classDates || []).map(d => d.id).sort();
        const first = dates[0] || new Date().toISOString().slice(0, 10);
        const [y, m] = first.split('-').map(Number);
        schedMonth = { year: y, month: m - 1 };
      }
      renderCalendar();
      renderScheduleList();
    }

    function renderCalendar() {
      const dates = schedClassroom.classDates || [];
      const dateMap = Object.fromEntries(dates.map(d => [d.id, d]));
      const { year, month } = schedMonth;
      const first = new Date(year, month, 1);
      const startDow = first.getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();

      document.getElementById('monthLabel').textContent =
        first.toLocaleDateString('th-TH', { month: 'long', year: 'numeric' });

      const grid = document.getElementById('calGrid');
      let html = ['อา', 'จ', 'อ', 'พ', 'พฤ', 'ศ', 'ส']
        .map(d => `<div class="cal-dow">${d}</div>`).join('');

      for (let i = 0; i < startDow; i++) html += '<div class="cal-cell empty"></div>';

      const todayStr = new Date().toISOString().slice(0, 10);
      for (let d = 1; d <= daysInMonth; d++) {
        const id = `${year}-${pad2(month + 1)}-${pad2(d)}`;
        const cd = dateMap[id];
        const cls = ['cal-cell'];
        if (cd) cls.push('class-day');
        if (id === todayStr) cls.push('today');
        const preview = cd && cd.content ? `<div class="cal-content">${escapeHtml(cd.content.slice(0, 30))}</div>` : '';
        const time = cd && (cd.startTime || cd.endTime)
          ? `<div class="cal-time">⏰ ${escapeHtml(cd.startTime || '')}${cd.endTime ? '-' + escapeHtml(cd.endTime) : ''}</div>`
          : '';
        html += `<div class="${cls.join(' ')}" data-id="${id}">
          <div class="cal-num">${d}</div>
          ${preview}${time}
        </div>`;
      }

      grid.innerHTML = html;
      grid.querySelectorAll('.cal-cell:not(.empty)').forEach(cell => {
        cell.onclick = () => openDateEditor(cell.dataset.id);
      });
    }

    function renderScheduleList() {
      const dates = (schedClassroom.classDates || []).slice().sort((a, b) => a.id.localeCompare(b.id));
      const el = document.getElementById('schedList');
      if (dates.length === 0) {
        el.innerHTML = `<div class="empty-state">ยังไม่มีวันเรียน — คลิกบนปฏิทินเพื่อเพิ่ม</div>`;
        return;
      }
      el.innerHTML = dates.map(d => `
        <div class="card sched-item" data-id="${escapeHtml(d.id)}">
          <div class="si-date">${escapeHtml(dateIdToTH(d.id))}</div>
          <div class="si-body">
            ${d.content ? `<div><b>เนื้อหา:</b> ${escapeHtml(d.content)}</div>` : ''}
            ${(d.startTime || d.endTime) ? `<div><b>เวลา:</b> ${escapeHtml(d.startTime || '')}${d.endTime ? ' - ' + escapeHtml(d.endTime) : ''}</div>` : ''}
            ${d.instructor ? `<div><b>วิทยากร:</b> ${escapeHtml(d.instructor)}</div>` : ''}
            ${(!d.content && !d.startTime && !d.endTime && !d.instructor) ? '<span class="hint">ยังไม่ระบุรายละเอียด</span>' : ''}
          </div>
          <div style="display:flex; gap:6px; flex-wrap: wrap;">
            <button class="secondary" data-edit="${escapeHtml(d.id)}">แก้ไข</button>
            <button class="danger" data-del="${escapeHtml(d.id)}">ลบ</button>
          </div>
        </div>
      `).join('');
      el.querySelectorAll('button[data-edit]').forEach(b => b.onclick = () => openDateEditor(b.dataset.edit));
      el.querySelectorAll('button[data-del]').forEach(b => b.onclick = () => deleteClassDate(b.dataset.del));
    }

    async function openDateEditor(dateId) {
      const dates = schedClassroom.classDates || [];
      const cd = dates.find(d => d.id === dateId) || { id: dateId };
      const isExisting = !!dates.find(d => d.id === dateId);
      // Load assignments for this date
      let assignsForDate = [];
      if (isExisting) {
        try {
          const r = await authFetch(`/api/c/${cid}/admin/class-dates/${dateId}/assignments`);
          if (r.ok) {
            const d = await r.json();
            assignsForDate = d.assignments || [];
          }
        } catch (e) {}
      }
      const root = document.getElementById('modalRoot');
      const matsHtml = (cd.materials && cd.materials.length > 0)
        ? `<div class="mat-existing">
            ${cd.materials.map((m, i) => `
              <div class="mat-item">
                <a href="${escapeHtml(m.url)}" target="_blank">📄 ${escapeHtml(m.name)}</a>
                <button type="button" class="danger" data-mat-del="${i}" style="padding: 4px 10px; font-size: 12px;">ลบ</button>
              </div>
            `).join('')}
          </div>`
        : '';
      const assignsHtml = assignsForDate.length > 0
        ? `<div class="mat-existing">
            ${assignsForDate.map(a => `
              <div class="mat-item">
                <span>${escapeHtml(a.title)} ${a.type === 'group' ? '<span class="tag-group">งานกลุ่ม</span>' : '<span class="tag-individual">งานเดี่ยว</span>'}</span>
                <span class="hint" style="font-size:12px;">เต็ม ${a.maxScore || 10}</span>
              </div>
            `).join('')}
          </div>`
        : '<p class="hint">ยังไม่มีงานในวันนี้</p>';

      root.innerHTML = `
        <div class="modal-backdrop" id="modalBg">
          <div class="modal" style="max-width: 720px;" onclick="event.stopPropagation()">
            <button class="secondary modal-close" id="closeModal">ปิด</button>
            <h3>${escapeHtml(dateIdToTH(dateId))}</h3>
            <p class="hint">${isExisting ? 'แก้ไขรายละเอียดวันเรียนนี้' : 'เพิ่มเป็นวันเรียน + กรอกรายละเอียด'}</p>
            <form id="dateForm">
              <label>เนื้อหา / หัวข้อบรรยาย</label>
              <textarea id="dContent" rows="3" placeholder="เช่น Introduction, การนำเสนอ Project, ฯลฯ">${escapeHtml(cd.content || '')}</textarea>
              <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                <div>
                  <label>เวลาเริ่ม</label>
                  <input type="time" id="dStart" value="${escapeHtml(cd.startTime || '')}" />
                </div>
                <div>
                  <label>เวลาเลิก</label>
                  <input type="time" id="dEnd" value="${escapeHtml(cd.endTime || '')}" />
                </div>
              </div>
              <label>วิทยากร / ผู้สอน</label>
              <input type="text" id="dInstr" placeholder="ชื่อวิทยากรประจำคาบ" value="${escapeHtml(cd.instructor || '')}" />
              <div style="display:flex; gap:8px; margin-top:14px;">
                <button type="submit" class="primary" style="flex:1; margin:0;">${isExisting ? 'บันทึกรายละเอียด' : 'เพิ่มเป็นวันเรียน'}</button>
                ${isExisting ? '<button type="button" class="danger" id="dDelBtn" style="margin:0;">ลบวันนี้ออก</button>' : ''}
              </div>
              <div id="dMsg"></div>
            </form>

            ${isExisting ? `
              <h3 style="margin-top: 24px;">📎 เอกสารประกอบ</h3>
              ${matsHtml}
              <form id="matForm">
                <label>อัปโหลดไฟล์ใหม่ (ไม่เกิน 20 MB)</label>
                <input type="file" id="matFile" />
                <button type="submit" class="secondary" style="margin-top: 8px;">อัปโหลด</button>
                <div id="matMsg"></div>
              </form>

              <h3 style="margin-top: 24px;">📝 งานในวันนี้</h3>
              ${assignsHtml}
              <button type="button" class="secondary" id="addAssignForDate" style="margin-top: 8px;">+ เพิ่มงานในวันนี้</button>
            ` : ''}
          </div>
        </div>
      `;
      const close = () => { root.innerHTML = ''; };
      document.getElementById('closeModal').onclick = close;
      document.getElementById('modalBg').onclick = (e) => { if (e.target.id === 'modalBg') close(); };
      document.getElementById('dateForm').onsubmit = async (e) => {
        e.preventDefault();
        const newCd = {
          id: dateId,
          label: dateIdToLabel(dateId),
          content: document.getElementById('dContent').value.trim(),
          startTime: document.getElementById('dStart').value,
          endTime: document.getElementById('dEnd').value,
          instructor: document.getElementById('dInstr').value.trim()
        };
        const updated = (schedClassroom.classDates || []).filter(d => d.id !== dateId);
        updated.push(newCd);
        updated.sort((a, b) => a.id.localeCompare(b.id));
        const ok = await saveClassDates(updated);
        if (ok) close();
      };
      const delBtn = document.getElementById('dDelBtn');
      if (delBtn) {
        delBtn.onclick = async () => {
          if (!confirm(`ลบวันเรียน ${dateIdToTH(dateId)} ออก?`)) return;
          const updated = (schedClassroom.classDates || []).filter(d => d.id !== dateId);
          const ok = await saveClassDates(updated);
          if (ok) close();
        };
      }

      // Material upload
      const matForm = document.getElementById('matForm');
      if (matForm) {
        matForm.onsubmit = async (e) => {
          e.preventDefault();
          const file = document.getElementById('matFile').files[0];
          const msgEl = document.getElementById('matMsg');
          if (!file) { msgEl.innerHTML = '<div class="message error">กรุณาเลือกไฟล์</div>'; return; }
          if (file.size > 20 * 1024 * 1024) { msgEl.innerHTML = '<div class="message error">ไฟล์ใหญ่เกิน 20 MB</div>'; return; }
          msgEl.innerHTML = '<div class="message info">กำลังอัปโหลด...</div>';
          const reader = new FileReader();
          reader.onload = async () => {
            try {
              const r = await authFetch(`/api/c/${cid}/admin/class-dates/${dateId}/materials`, {
                method: 'POST',
                body: JSON.stringify({ fileData: reader.result, fileName: file.name })
              });
              const d = await r.json();
              if (!r.ok) { msgEl.innerHTML = `<div class="message error">${escapeHtml(d.error)}</div>`; return; }
              msgEl.innerHTML = '<div class="message success">อัปโหลดสำเร็จ</div>';
              setTimeout(() => { close(); openDateEditor(dateId); }, 400);
            } catch (e) {
              msgEl.innerHTML = `<div class="message error">${escapeHtml(e.message)}</div>`;
            }
          };
          reader.readAsDataURL(file);
        };
      }

      // Material delete
      root.querySelectorAll('button[data-mat-del]').forEach(b => {
        b.onclick = async () => {
          if (!confirm('ลบไฟล์นี้?')) return;
          await authFetch(`/api/c/${cid}/admin/class-dates/${dateId}/materials/${b.dataset.matDel}`, { method: 'DELETE' });
          close(); openDateEditor(dateId);
        };
      });

      // Add assignment for this date
      const addAssignBtn = document.getElementById('addAssignForDate');
      if (addAssignBtn) {
        addAssignBtn.onclick = () => {
          close();
          openNewAssignModal(dateId);
        };
      }
    }

    async function saveClassDates(newDates) {
      const r = await authFetch(`/api/admin/classrooms/${cid}`, {
        method: 'PATCH',
        body: JSON.stringify({ classDates: newDates })
      });
      if (!r.ok) {
        alert('บันทึกไม่สำเร็จ');
        return false;
      }
      await loadSchedule();
      return true;
    }

    async function deleteClassDate(dateId) {
      if (!confirm(`ลบวันเรียน ${dateIdToTH(dateId)} ออก?`)) return;
      const updated = (schedClassroom.classDates || []).filter(d => d.id !== dateId);
      await saveClassDates(updated);
    }

    document.getElementById('prevMonthBtn').onclick = () => {
      if (!schedMonth) return;
      schedMonth.month--;
      if (schedMonth.month < 0) { schedMonth.month = 11; schedMonth.year--; }
      renderCalendar();
    };
    document.getElementById('nextMonthBtn').onclick = () => {
      if (!schedMonth) return;
      schedMonth.month++;
      if (schedMonth.month > 11) { schedMonth.month = 0; schedMonth.year++; }
      renderCalendar();
    };
    document.getElementById('todayBtn').onclick = () => {
      const t = new Date();
      schedMonth = { year: t.getFullYear(), month: t.getMonth() };
      renderCalendar();
    };

    async function loadAssignmentsAdmin() {
      const res = await authFetch(`/api/c/${cid}/admin/assignments`);
      if (res.status === 401) { logout(); return; }
      const { assignments } = await res.json();
      const el = document.getElementById('assignmentsTab');
      let html = `
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;">
          <p class="hint" style="margin:0;">รวม ${assignments.length} งาน</p>
          <button class="primary" id="newAssignBtn" style="margin:0;">+ สร้างงานใหม่</button>
        </div>
      `;
      if (assignments.length === 0) {
        html += `<div class="empty-state">ยังไม่มีงาน</div>`;
      } else {
        html += assignments.map(a => `
          <div class="card" data-aid="${a.id}">
            <div style="display:flex; justify-content:space-between; align-items:flex-start; gap: 12px; flex-wrap: wrap;">
              <div style="flex:1; min-width: 240px;">
                <div style="font-size:16px; font-weight:600; color:#222;">
                  ${escapeHtml(a.title)}
                  ${a.type === 'group' ? '<span class="tag-group">งานกลุ่ม</span>' : '<span class="tag-individual">งานเดี่ยว</span>'}
                  ${a.isOpen ? '<span class="badge-success">เปิดรับ</span>' : '<span class="badge-pending">ปิด</span>'}
                </div>
                ${a.description ? `<div style="margin-top:6px; color:#666; font-size:13px;">${escapeHtml(a.description)}</div>` : ''}
                <div class="hint" style="margin-top:6px;">
                  ${a.dueDate ? `กำหนดส่ง: ${formatDate(a.dueDate)} · ` : ''}
                  สร้าง: ${formatDate(a.createdAt)} · ส่งแล้ว ${a.submissionCount} รายการ
                </div>
              </div>
              <div class="cr-actions">
                <button class="secondary" data-act="view" data-id="${a.id}">ดูที่ส่ง</button>
                <button class="secondary" data-act="toggle" data-id="${a.id}">${a.isOpen ? 'ปิดรับ' : 'เปิดรับ'}</button>
                <button class="danger" data-act="delete" data-id="${a.id}">ลบ</button>
              </div>
            </div>
          </div>
        `).join('');
      }
      el.innerHTML = html;
      document.getElementById('newAssignBtn').onclick = openNewAssignModal;
      el.querySelectorAll('button[data-act]').forEach(b => {
        b.onclick = async () => {
          const id = b.dataset.id;
          const act = b.dataset.act;
          if (act === 'delete') {
            if (!confirm('ลบงานนี้และข้อมูลที่ส่งทั้งหมด?')) return;
            await authFetch(`/api/c/${cid}/admin/assignments/${id}`, { method: 'DELETE' });
            loadAssignmentsAdmin();
          } else if (act === 'toggle') {
            const cur = assignments.find(x => x.id == id);
            await authFetch(`/api/c/${cid}/admin/assignments/${id}`, {
              method: 'PATCH', body: JSON.stringify({ isOpen: !cur.isOpen })
            });
            loadAssignmentsAdmin();
          } else if (act === 'view') {
            await viewSubmissions(id);
          }
        };
      });
    }

    function openNewAssignModal(presetDateId) {
      const root = document.getElementById('modalRoot');
      const dateNote = presetDateId
        ? `<p class="hint">งานนี้จะผูกกับวันที่ <b>${escapeHtml(dateIdToTH(presetDateId))}</b></p>`
        : '';
      root.innerHTML = `
        <div class="modal-backdrop" id="modalBg">
          <div class="modal" onclick="event.stopPropagation()">
            <button class="secondary modal-close" id="closeModal">ปิด</button>
            <h3>สร้างงานใหม่</h3>
            ${dateNote}
            <form id="aForm">
              <label>ชื่องาน</label>
              <input type="text" id="aTitle" required />
              <label>คำอธิบาย</label>
              <textarea id="aDesc" rows="3" placeholder="ไม่บังคับ"></textarea>
              <label>ประเภท</label>
              <div class="mode-options">
                <label class="mode-opt">
                  <input type="radio" name="aType" value="individual" checked />
                  <div><b>งานเดี่ยว</b><span>นักศึกษาแต่ละคนส่งของตัวเอง</span></div>
                </label>
                <label class="mode-opt">
                  <input type="radio" name="aType" value="group" />
                  <div><b>งานกลุ่ม</b><span>ทุกคนในกลุ่มมีงานชิ้นเดียวกัน — ใครส่งก่อนได้</span></div>
                </label>
              </div>
              <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                <div>
                  <label>คะแนนเต็ม</label>
                  <input type="number" id="aMaxScore" value="10" min="0" step="0.5" />
                </div>
                <div>
                  <label>กำหนดส่ง (ไม่บังคับ)</label>
                  <input type="datetime-local" id="aDue" />
                </div>
              </div>
              <button type="submit" class="primary">สร้างงาน</button>
              <div id="aMsg"></div>
            </form>
          </div>
        </div>
      `;
      const close = () => { document.getElementById('modalRoot').innerHTML = ''; };
      document.getElementById('closeModal').onclick = close;
      document.getElementById('modalBg').onclick = (e) => { if (e.target.id === 'modalBg') close(); };
      document.getElementById('aForm').onsubmit = async (e) => {
        e.preventDefault();
        const due = document.getElementById('aDue').value;
        const payload = {
          title: document.getElementById('aTitle').value.trim(),
          description: document.getElementById('aDesc').value.trim(),
          type: document.querySelector('input[name="aType"]:checked').value,
          dueDate: due ? new Date(due).toISOString() : (presetDateId || ''),
          classDateId: presetDateId || '',
          maxScore: parseFloat(document.getElementById('aMaxScore').value) || 10
        };
        const r = await authFetch(`/api/c/${cid}/admin/assignments`, {
          method: 'POST', body: JSON.stringify(payload)
        });
        const data = await r.json();
        if (!r.ok) {
          document.getElementById('aMsg').innerHTML = `<div class="message error">${escapeHtml(data.error)}</div>`;
          return;
        }
        close();
        if (typeof loadAssignmentsAdmin === 'function') loadAssignmentsAdmin();
        if (typeof loadSchedule === 'function' && presetDateId) loadSchedule();
      };
    }

    async function viewSubmissions(aid) {
      const r = await authFetch(`/api/c/${cid}/admin/assignments/${aid}/submissions`);
      const data = await r.json();
      const a = data.assignment;
      const subs = data.submissions || [];
      const root = document.getElementById('modalRoot');
      const maxScore = a.maxScore || 10;
      const rows = subs.length === 0
        ? '<tr><td colspan="7" style="text-align:center;color:#888;padding:20px;">ยังไม่มีคนส่ง</td></tr>'
        : subs.map(s => `
            <tr data-sub="${s.id}">
              <td>${s.submitterSelfie ? `<img class="thumb" src="${escapeHtml(s.submitterSelfie)}" />` : `<div class="thumb no-photo">?</div>`}</td>
              <td>${escapeHtml(s.studentId)}</td>
              <td>${escapeHtml(s.submitterFullName || s.submitterName)}</td>
              <td>${s.groupNum ? `กลุ่ม ${escapeHtml(s.groupNum)}` : '-'}</td>
              <td style="font-size:12px; max-width: 240px;">
                ${s.content ? `<div>${escapeHtml(s.content)}</div>` : ''}
                ${s.link ? `<div><a href="${escapeHtml(s.link)}" target="_blank">🔗 ${escapeHtml(s.link)}</a></div>` : ''}
                ${s.fileUrl ? `<div><a href="${escapeHtml(s.fileUrl)}" target="_blank">📎 ${escapeHtml(s.fileName || 'ไฟล์')}</a></div>` : ''}
                <div class="hint" style="font-size:11px;">${formatDate(s.submittedAt)}</div>
              </td>
              <td style="font-size:13px; min-width: 200px;">
                <input type="number" class="grade-score" min="0" max="${maxScore}" step="0.5" placeholder="0-${maxScore}" value="${s.score != null ? s.score : ''}" style="width: 70px; padding: 6px;" />
                <span style="color:#888;"> / ${maxScore}</span>
                <textarea class="grade-feedback" rows="2" placeholder="ความคิดเห็น" style="margin-top:4px; font-size:12px;">${escapeHtml(s.feedback || '')}</textarea>
              </td>
              <td>
                <button class="primary grade-save" style="padding: 6px 12px; font-size: 13px;">บันทึกคะแนน</button>
                ${s.gradedAt ? `<div class="hint" style="font-size:10px; margin-top:4px;">ตรวจ ${formatDate(s.gradedAt)}</div>` : ''}
                <div class="grade-msg" style="margin-top: 4px;"></div>
              </td>
            </tr>
          `).join('');
      root.innerHTML = `
        <div class="modal-backdrop" id="modalBg">
          <div class="modal" style="max-width:1100px;" onclick="event.stopPropagation()">
            <button class="secondary modal-close" id="closeModal">ปิด</button>
            <h3>${escapeHtml(a.title)} <span style="color:#888; font-size: 14px; font-weight:normal;">เต็ม ${maxScore}</span></h3>
            <p class="hint">${a.type === 'group' ? 'งานกลุ่ม' : 'งานเดี่ยว'} · ส่งแล้ว ${subs.length} รายการ</p>
            <table>
              <thead><tr><th>รูป</th><th>รหัส</th><th>ผู้ส่ง</th><th>กลุ่ม</th><th>งานที่ส่ง</th><th>คะแนน + ความคิดเห็น</th><th></th></tr></thead>
              <tbody>${rows}</tbody>
            </table>
          </div>
        </div>
      `;
      document.getElementById('closeModal').onclick = () => { root.innerHTML = ''; };
      document.getElementById('modalBg').onclick = (e) => { if (e.target.id === 'modalBg') root.innerHTML = ''; };
      // Bind grade save buttons
      root.querySelectorAll('tr[data-sub]').forEach(tr => {
        const sid = tr.dataset.sub;
        const btn = tr.querySelector('.grade-save');
        const scoreInput = tr.querySelector('.grade-score');
        const feedbackInput = tr.querySelector('.grade-feedback');
        const msgEl = tr.querySelector('.grade-msg');
        btn.onclick = async () => {
          msgEl.innerHTML = '<span class="hint">กำลังบันทึก...</span>';
          const r = await authFetch(`/api/c/${cid}/admin/submissions/${sid}`, {
            method: 'PATCH',
            body: JSON.stringify({
              score: scoreInput.value,
              feedback: feedbackInput.value
            })
          });
          const d = await r.json();
          if (!r.ok) { msgEl.innerHTML = `<span style="color:#c33;">${escapeHtml(d.error)}</span>`; return; }
          msgEl.innerHTML = '<span style="color:#27ae60;">✓ บันทึก</span>';
        };
      });
    }

    async function loadUsers() {
      const res = await authFetch(`/api/c/${cid}/admin/users`);
      if (res.status === 401) { logout(); return; }
      const { grouped, users, classDates, classroom } = await res.json();
      const el = document.getElementById('usersTab');
      if (users.length === 0) {
        el.innerHTML = `<div class="empty-state">ยังไม่มีผู้ลงทะเบียน</div>`;
        return;
      }
      const dates = classDates || [];
      const validGroups = (classroom && classroom.validGroups) || [];
      const groupNames = Object.keys(grouped).sort((a, b) => a.localeCompare(b));
      let html = `<p class="hint">รวม ${users.length} คน · ${groupNames.length} กลุ่ม · จัดกลุ่มแบบ <b>${escapeHtml(modeLabel(classroom && classroom.groupAssignmentMode))}</b> · คลิก dropdown ในคอลัมน์กลุ่มเพื่อย้ายคน</p>`;
      groupNames.forEach(g => {
        html += `
          <div class="group-section">
            <div class="group-title">กลุ่ม ${escapeHtml(g)} (${grouped[g].length} คน)</div>
            <table>
              <thead>
                <tr>
                  <th>รูป</th>
                  <th>รหัส</th>
                  <th>ชื่อ-นามสกุล</th>
                  <th>ชื่อเล่น</th>
                  <th>กลุ่ม</th>
                  <th>เวลาลงทะเบียน</th>
                  <th>วันที่มาเรียน</th>
                  <th>คะแนนที่ได้รับ</th>
                </tr>
              </thead>
              <tbody>
                ${grouped[g].map(u => {
                  const att = Array.isArray(u.attendance) ? u.attendance : [];
                  const tags = dates.length === 0
                    ? '-'
                    : (u.attendance === undefined
                        ? '<span style="color:#aaa;font-size:13px;">ยังไม่ได้ส่ง</span>'
                        : dates.map(d => att.includes(d.id)
                            ? `<span class="attend-tag">${escapeHtml(d.label)}</span>`
                            : `<span class="attend-tag absent">${escapeHtml(d.label)}</span>`).join(' '));
                  const photo = u.selfie
                    ? `<img class="thumb" src="${escapeHtml(u.selfie)}" alt="" />`
                    : `<div class="thumb no-photo">?</div>`;
                  const groupSelect = `
                    <select class="group-select" data-id="${escapeHtml(u.studentId)}">
                      <option value="" ${!u.group ? 'selected' : ''}>—</option>
                      ${validGroups.map(g2 => `<option value="${escapeHtml(g2)}" ${u.group === g2 ? 'selected' : ''}>${escapeHtml(g2)}</option>`).join('')}
                    </select>
                  `;
                  return `
                    <tr>
                      <td>${photo}</td>
                      <td>${escapeHtml(u.studentId)}</td>
                      <td>${escapeHtml((u.firstName || '') + ' ' + (u.lastName || ''))}</td>
                      <td>${escapeHtml(u.nickname || '-')}</td>
                      <td>${groupSelect}</td>
                      <td>${formatDate(u.registeredAt)}</td>
                      <td>${tags}</td>
                      <td><button class="secondary view-votes-btn" data-id="${escapeHtml(u.studentId)}">ดูคะแนน</button></td>
                    </tr>
                  `;
                }).join('')}
              </tbody>
            </table>
          </div>
        `;
      });
      el.innerHTML = html;
      el.querySelectorAll('.view-votes-btn').forEach(b => {
        b.onclick = () => showVoteDetails(b.dataset.id);
      });
      el.querySelectorAll('.group-select').forEach(sel => {
        sel.onchange = async () => {
          const studentId = sel.dataset.id;
          const newGroup = sel.value;
          const r = await authFetch(`/api/c/${cid}/admin/set-group`, {
            method: 'POST',
            body: JSON.stringify({ studentId, group: newGroup })
          });
          if (!r.ok) {
            const data = await r.json().catch(() => ({}));
            alert(data.error || 'เปลี่ยนกลุ่มไม่สำเร็จ');
          }
          await loadUsers();
        };
      });
    }

    async function loadScores() {
      const res = await authFetch(`/api/c/${cid}/admin/scores`);
      if (!res.ok) return;
      const { scores, classDates, attendancePercent } = await res.json();
      const el = document.getElementById('scoresTab');
      if (scores.length === 0) {
        el.innerHTML = `<div class="empty-state">ยังไม่มีข้อมูล</div>`;
        return;
      }
      const dates = classDates || [];
      const pct = attendancePercent || 5;
      const groups = {};
      scores.forEach(s => { const k = s.group || '(ไม่มีกลุ่ม)'; if (!groups[k]) groups[k] = []; groups[k].push(s); });
      const groupNames = Object.keys(groups).sort((a, b) => a.localeCompare(b));
      let html = `<p class="hint">คะแนนโหวต = <b>Mode</b> · คะแนนเข้าเรียน = ${pct}% × วัน (เต็ม ${pct * dates.length}%)</p>`;
      const dateHeaders = dates.map(d => `<th>${escapeHtml(d.label)}</th>`).join('');
      groupNames.forEach(g => {
        html += `
          <div class="group-section">
            <div class="group-title">กลุ่ม ${escapeHtml(g)}</div>
            <table>
              <thead>
                <tr>
                  <th>รูป</th><th>รหัส</th><th>ชื่อ</th><th>ผู้โหวต</th>
                  <th>Mode</th><th>คะแนนทั้งหมด</th>
                  ${dateHeaders}
                  <th>เข้าเรียน</th><th>คะแนนเข้าเรียน</th>
                </tr>
              </thead>
              <tbody>
                ${groups[g].map(s => {
                  const cells = dates.map(d => {
                    const ok = (s.attendance || []).includes(d.id);
                    return `<td style="text-align:center;">${ok ? '✓' : '<span style="color:#ccc;">–</span>'}</td>`;
                  }).join('');
                  const photo = s.selfie
                    ? `<img class="thumb" src="${escapeHtml(s.selfie)}" alt="" />`
                    : `<div class="thumb no-photo">?</div>`;
                  return `
                    <tr>
                      <td>${photo}</td>
                      <td>${escapeHtml(s.studentId)}</td>
                      <td>${escapeHtml(s.fullName)}${s.nickname ? ` <span style="color:#888;">(${escapeHtml(s.nickname)})</span>` : ''}</td>
                      <td>${s.voteCount}</td>
                      <td>${s.voteCount > 0 ? `<span class="score-pill">${escapeHtml(s.modeScore)}</span>` : '-'}</td>
                      <td style="color:#777; font-size:13px;">${s.scores.join(', ') || '-'}</td>
                      ${cells}
                      <td style="text-align:center;">${s.attendanceCount}/${dates.length}</td>
                      <td style="text-align:center;font-weight:600;color:#4555a6;">${s.attendanceScore}%</td>
                    </tr>
                  `;
                }).join('')}
              </tbody>
            </table>
          </div>
        `;
      });
      el.innerHTML = html;
    }

    async function showVoteDetails(studentId) {
      const res = await authFetch(`/api/c/${cid}/admin/votes/${encodeURIComponent(studentId)}`);
      const data = await res.json();
      const root = document.getElementById('modalRoot');
      const u = data.user;
      const rows = data.votes.length > 0
        ? data.votes.map(v => `
            <tr>
              <td>${escapeHtml(v.voterId)}</td>
              <td>${escapeHtml(v.voterName)}</td>
              <td><span class="score-pill">${v.score}</span></td>
              <td style="color:#888;font-size:13px;">${formatDate(v.timestamp)}</td>
            </tr>`).join('')
        : `<tr><td colspan="4" style="text-align:center;color:#888;padding:20px;">ยังไม่มีคนโหวต</td></tr>`;
      const fullName = `${u.firstName || ''} ${u.lastName || ''}`.trim() || u.name || u.studentId;
      root.innerHTML = `
        <div class="modal-backdrop" id="modalBg">
          <div class="modal" onclick="event.stopPropagation()">
            <button class="secondary modal-close" id="closeModal">ปิด</button>
            <h3>คะแนนโหวตของ ${escapeHtml(fullName)} (${escapeHtml(u.studentId)})</h3>
            <p class="hint" style="margin-bottom: 14px;">
              กลุ่ม ${escapeHtml(u.group || '-')} · ผู้โหวต ${data.count} คน · Mode: <b>${data.count > 0 ? escapeHtml(data.mode) : '-'}</b>
            </p>
            <table>
              <thead><tr><th>รหัส</th><th>ชื่อ</th><th>คะแนน</th><th>เวลา</th></tr></thead>
              <tbody>${rows}</tbody>
            </table>
          </div>
        </div>
      `;
      document.getElementById('modalBg').onclick = (e) => { if (e.target.id === 'modalBg') root.innerHTML = ''; };
      document.getElementById('closeModal').onclick = () => { root.innerHTML = ''; };
    }

    // Auto-refresh class view every 5s
    setInterval(() => {
      if (cid && classView.style.display !== 'none' && token) {
        loadClassMeta(); loadUsers(); loadScores();
      }
    }, 5000);
  </script>
</body>
</html>
