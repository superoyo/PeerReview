<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard</title>
  <link rel="stylesheet" href="/style.css?v=15" />
</head>
<body class="dashboard-body">
  <div class="dashboard-fullscreen">
    <div class="dash-header">
      <div>
        <h1 id="cTitle">Dashboard</h1>
        <div style="font-size:12px;color:#888;" id="cSub"></div>
      </div>
      <div class="dash-stats">
        <span>ผู้ลงทะเบียน: <b id="total">-</b> คน</span>
        <span>โหวตเสร็จ: <b id="voted" style="color:#27ae60;">-</b> คน</span>
        <span id="voteStateLabel"></span>
        <span class="dash-links">
          <a href="/" id="homeLink">หน้าหลัก</a>
          <a id="regLink">ลงทะเบียน</a>
          <a id="adminLink">หลังบ้าน</a>
        </span>
      </div>
    </div>

    <div class="groups-grid-2x2" id="groupsDisplay">
      <div class="empty-state">กำลังโหลด...</div>
    </div>
  </div>

  <script>
    const cid = window.location.pathname.split('/')[2];
    document.getElementById('regLink').href = `/c/${cid}`;
    document.getElementById('adminLink').href = `/c/${cid}/admin`;

    const totalEl = document.getElementById('total');
    const votedEl = document.getElementById('voted');
    const groupsEl = document.getElementById('groupsDisplay');
    const voteStateEl = document.getElementById('voteStateLabel');

    function escapeHtml(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }

    let dashFields = [];
    let lastData = null;
    let expandedGroup = null;

    function memberValue(m, key) {
      if (key === 'name') return `${m.firstName || ''} ${m.lastName || ''}`.trim() || m.fullName || '';
      return m[key] || '';
    }

    async function load() {
      try {
        const res = await fetch(`/api/c/${cid}/dashboard`);
        if (!res.ok) {
          groupsEl.innerHTML = `<div class="message error">ไม่พบห้องเรียน</div>`;
          return;
        }
        const data = await res.json();
        if (data.classroom) {
          document.getElementById('cTitle').textContent = `${data.classroom.code} — ${data.classroom.name}`;
          document.getElementById('cSub').textContent = data.classroom.university || '';
        }
        totalEl.textContent = data.total;
        votedEl.textContent = data.votedCount;
        voteStateEl.innerHTML = data.votingOpen
          ? '· <span style="color:#27ae60;font-weight:600;">เปิดให้โหวต</span>'
          : '· <span style="color:#888;">ยังไม่เปิดโหวต</span>';
        dashFields = (data.profileFields || []).filter(f => f.enabled && f.showOnDashboard);
        lastData = data;
        // If currently-expanded group disappeared (e.g., admin changed groups), reset
        if (expandedGroup && !(data.groups || []).includes(expandedGroup)) expandedGroup = null;
        renderGroups();
      } catch (e) {
        groupsEl.innerHTML = `<div class="message error">โหลดข้อมูลไม่ได้</div>`;
      }
    }

    function renderMemberInfo(m) {
      const values = dashFields.map(f => memberValue(m, f.key)).filter(v => v);
      if (values.length === 0) return '';
      const primary = values[0];
      const rest = values.slice(1);
      return `
        <div class="member-name">${escapeHtml(primary)}</div>
        ${rest.map(v => `<div class="member-id">${escapeHtml(v)}</div>`).join('')}
      `;
    }

    function renderGroupCard(g, members, mode) {
      members = members || [];
      const votedInGroup = members.filter(m => m.hasVoted).length;
      const cardCls = ['group-card', 'card', mode];
      const cornerBtn = mode === 'expanded'
        ? `<button class="corner-btn" data-close="1" title="ย่อกลับ">✕</button>`
        : (mode === 'compact'
            ? '' // compact cards: click anywhere on card to expand
            : `<button class="corner-btn" data-expand="${escapeHtml(g)}" title="ขยายเต็ม">⛶</button>`);
      const cards = members.length === 0
        ? `<div class="empty-state" style="padding:14px;">ยังไม่มีคนลงทะเบียน</div>`
        : members.map(m => {
            const cls = ['member-card'];
            if (m.hasVoted) cls.push('voted');
            if (!m.selfie) cls.push('no-selfie');
            const badge = m.hasVoted ? '<div class="vote-badge" title="โหวตเสร็จแล้ว">✓</div>' : '';
            const photo = m.selfie
              ? `<img src="${escapeHtml(m.selfie)}?t=${Date.now()}" alt="" />`
              : `<div class="no-photo">?</div>`;
            const tooltip = `${m.studentId || ''} ${m.fullName || m.name}${m.hasVoted ? ' · โหวตแล้ว' : ''}`;
            const userKey = m.phone || m.studentId || '';
            return `
              <div class="${cls.join(' ')}" data-user="${escapeHtml(userKey)}" title="${escapeHtml(tooltip)}" style="cursor: pointer;">
                <div class="member-photo">${photo}${badge}</div>
                ${renderMemberInfo(m)}
              </div>`;
          }).join('');
      const dataAttr = mode === 'compact' ? `data-pick="${escapeHtml(g)}"` : '';
      return `
        <div class="${cardCls.join(' ')}" ${dataAttr}>
          ${cornerBtn}
          <div class="group-header">
            <h2>กลุ่ม ${escapeHtml(g)}</h2>
            <span class="group-count">
              ${members.length} คน
              ${members.length > 0 ? `<span class="voted-pill">✓ ${votedInGroup}</span>` : ''}
            </span>
          </div>
          <div class="member-grid">${cards}</div>
        </div>`;
    }

    function renderGroups() {
      if (!lastData) return;
      const { grouped, groups } = lastData;

      if (expandedGroup) {
        groupsEl.className = 'groups-expanded';
        const others = groups.filter(g => g !== expandedGroup);
        groupsEl.innerHTML = `
          <div class="expanded-area">${renderGroupCard(expandedGroup, grouped[expandedGroup], 'expanded')}</div>
          <div class="others-row">${others.map(g => renderGroupCard(g, grouped[g], 'compact')).join('')}</div>
        `;
      } else {
        groupsEl.className = 'groups-grid-2x2';
        groupsEl.innerHTML = groups.map(g => renderGroupCard(g, grouped[g], 'normal')).join('');
      }

      // Bind buttons
      groupsEl.querySelectorAll('[data-expand]').forEach(b => {
        b.onclick = (e) => { e.stopPropagation(); expandedGroup = b.dataset.expand; renderGroups(); };
      });
      groupsEl.querySelectorAll('[data-close]').forEach(b => {
        b.onclick = (e) => { e.stopPropagation(); expandedGroup = null; renderGroups(); };
      });
      groupsEl.querySelectorAll('[data-pick]').forEach(card => {
        card.onclick = () => { expandedGroup = card.dataset.pick; renderGroups(); };
      });
      // Click on member card → show details popup
      groupsEl.querySelectorAll('.member-card[data-user]').forEach(mc => {
        mc.onclick = (e) => {
          e.stopPropagation();
          const userKey = mc.dataset.user;
          for (const g of lastData.groups) {
            const found = (lastData.grouped[g] || []).find(m => (m.phone || m.studentId) === userKey);
            if (found) { showMemberDetail(found); return; }
          }
        };
      });
    }

    function showMemberDetail(m) {
      const modal = document.createElement('div');
      modal.className = 'photo-modal';
      const fullName = `${m.firstName || ''} ${m.lastName || ''}`.trim() || m.fullName || m.name || '-';
      modal.innerHTML = `
        <div class="member-detail-modal" onclick="event.stopPropagation()">
          <button class="md-close-btn" type="button" title="ปิด">✕</button>
          <div class="md-photo-wrap">
            ${m.selfie
              ? `<img class="md-photo" src="${escapeHtml(m.selfie)}" alt="" />`
              : `<div class="md-photo no-photo big">?</div>`}
            ${m.hasVoted ? '<div class="md-vote-badge" title="โหวตเสร็จแล้ว">✓</div>' : ''}
          </div>
          <h2 class="md-name">${escapeHtml(fullName)}</h2>
          ${m.nickname ? `<div class="md-nick">(${escapeHtml(m.nickname)})</div>` : ''}
          <ul class="md-info">
            ${m.studentId ? `<li><b>รหัสนักศึกษา:</b> ${escapeHtml(m.studentId)}</li>` : ''}
            ${m.faculty ? `<li><b>คณะ:</b> ${escapeHtml(m.faculty)}</li>` : ''}
            ${m.department ? `<li><b>สาขา:</b> ${escapeHtml(m.department)}</li>` : ''}
            ${m.university ? `<li><b>มหาวิทยาลัย:</b> ${escapeHtml(m.university)}</li>` : ''}
            ${m.company ? `<li><b>บริษัท:</b> ${escapeHtml(m.company)}</li>` : ''}
            ${m.position ? `<li><b>ตำแหน่ง:</b> ${escapeHtml(m.position)}</li>` : ''}
            ${m.hasVoted ? '<li class="md-voted">✓ โหวตเสร็จแล้ว</li>' : ''}
          </ul>
        </div>
      `;
      const close = () => modal.remove();
      modal.onclick = (e) => { if (e.target === modal) close(); };
      modal.querySelector('.md-close-btn').onclick = close;
      const escHandler = (e) => {
        if (e.key === 'Escape') { close(); document.removeEventListener('keydown', escHandler); }
      };
      document.addEventListener('keydown', escHandler);
      document.body.appendChild(modal);
    }

    load();
    setInterval(load, 5000);
  </script>
</body>
</html>
