<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>โปรไฟล์</title>
  <link rel="stylesheet" href="/style.css?v=12" />
</head>
<body>
  <div class="container">
    <a href="" id="backLink" class="hint" style="text-decoration:none;">← กลับหน้าห้องเรียน</a>
    <h1 style="margin-top:6px;">โปรไฟล์ของฉัน</h1>
    <p class="subtitle">อัปเดตข้อมูลของคุณในคลาสนี้</p>

    <div id="cInfo" class="user-info" style="margin-bottom:18px;">-</div>

    <form id="profileForm">
      <label>เบอร์มือถือ <span class="opt">(แก้ไม่ได้)</span></label>
      <input type="text" id="phone" disabled />

      <label for="studentId">รหัสนักศึกษา</label>
      <input type="text" id="studentId" />

      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
        <div>
          <label for="firstName">ชื่อ</label>
          <input type="text" id="firstName" />
        </div>
        <div>
          <label for="lastName">นามสกุล</label>
          <input type="text" id="lastName" />
        </div>
      </div>

      <label for="nickname">ชื่อเล่น</label>
      <input type="text" id="nickname" />

      <div id="groupSection" style="display:none;">
        <label>กลุ่ม</label>
        <div id="groupDisplay" style="padding: 12px 14px; background: #f5f7fc; border-radius: 8px; font-size: 16px; font-weight: 600; color: #4555a6;"></div>
        <p class="hint" id="groupHint" style="margin-top:6px;"></p>
      </div>

      <button type="submit" class="primary">บันทึก</button>
    </form>

    <div style="margin-top: 18px; text-align: center;">
      <a href="" id="selfieLink" class="secondary" style="display:inline-block; padding:10px 20px; border-radius:8px; background:#f0f2f8; color:#444; text-decoration:none; font-size:14px;">📷 ถ่าย Selfie ใหม่</a>
    </div>

    <div id="message"></div>
  </div>

  <script>
    const cid = window.location.pathname.split('/')[2];
    const userKey = `pr_user_${cid}`;
    const user = JSON.parse(localStorage.getItem(userKey) || 'null');
    if (!user) window.location.href = `/c/${cid}`;
    document.getElementById('backLink').href = `/c/${cid}/feed`;
    document.getElementById('selfieLink').href = `/c/${cid}/selfie`;

    function escapeHtml(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }
    const msg = document.getElementById('message');
    const userIdent = encodeURIComponent(user.phone || user.studentId);

    let classroom = null;

    async function loadAll() {
      const [r1, r2] = await Promise.all([
        fetch(`/api/c/${cid}`),
        fetch(`/api/c/${cid}/me/${userIdent}`)
      ]);
      if (!r1.ok || !r2.ok) {
        msg.innerHTML = `<div class="message error">โหลดข้อมูลไม่ได้</div>`;
        return;
      }
      classroom = (await r1.json()).classroom;
      const me = (await r2.json()).user;
      Object.assign(user, me);
      localStorage.setItem(userKey, JSON.stringify(user));

      document.getElementById('cInfo').innerHTML =
        `<b>${escapeHtml(classroom.code)}</b> — ${escapeHtml(classroom.name)}`;
      document.getElementById('phone').value = me.phone || '';
      document.getElementById('studentId').value = me.studentId || '';
      document.getElementById('firstName').value = me.firstName || '';
      document.getElementById('lastName').value = me.lastName || '';
      document.getElementById('nickname').value = me.nickname || '';

      if (classroom.peerReviewEnabled) {
        const mode = classroom.groupAssignmentMode || 'self';
        const sec = document.getElementById('groupSection');
        sec.style.display = '';
        const display = document.getElementById('groupDisplay');
        const hint = document.getElementById('groupHint');
        display.textContent = me.group ? `กลุ่ม ${me.group}` : 'ยังไม่ได้กำหนดกลุ่ม';
        if (!me.group) display.style.color = '#888';
        const modeText = mode === 'self' ? 'นักศึกษาเลือกเองตอนลงทะเบียน'
                       : mode === 'random' ? 'ระบบสุ่ม'
                       : 'ผู้สอนกำหนด';
        hint.textContent = `วิธีการจัดกลุ่ม: ${modeText} · กลุ่มเปลี่ยนในหน้านี้ไม่ได้`;
      }
    }

    document.getElementById('profileForm').onsubmit = async (e) => {
      e.preventDefault();
      msg.innerHTML = '';
      const payload = {
        studentId: document.getElementById('studentId').value.trim(),
        firstName: document.getElementById('firstName').value.trim(),
        lastName: document.getElementById('lastName').value.trim(),
        nickname: document.getElementById('nickname').value.trim()
      };
      // Group cannot be changed via profile page
      try {
        const res = await fetch(`/api/c/${cid}/me/${userIdent}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (!res.ok) {
          msg.innerHTML = `<div class="message error">${escapeHtml(data.error)}</div>`;
          return;
        }
        Object.assign(user, data.user);
        localStorage.setItem(userKey, JSON.stringify(user));
        msg.innerHTML = `<div class="message success">บันทึกเรียบร้อย</div>`;
      } catch (e) {
        msg.innerHTML = `<div class="message error">${escapeHtml(e.message)}</div>`;
      }
    };

    loadAll();
  </script>
</body>
</html>
